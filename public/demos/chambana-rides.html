      <div style={{height:'100%',overflowY:'auto',background:G.bg,paddingBottom:100}}>
        {/* Header */}
        <div style={{background:G.hero,padding:'48px 20px 28px',borderRadius:`0 0 ${T.radiusXl}px ${T.radiusXl}px`,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,215,0,0.06),transparent)'}}/>
          <div style={{position:'relative',zIndex:2,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button onClick={()=>setView('tracking')} style={{background:'rgba(255,215,0,0.1)',border:'1px solid rgba(255,215,0,0.2)',borderRadius:10,
                width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <Icon name="arrow_back" size={18} color={G.gold}/>
              </button>
              <div>
                <div style={{fontSize:18,fontWeight:900,color:G.text}}>My VIP Trip</div>
                <div style={{fontSize:11,color:G.textSub}}>Ref #{bookingRef.current}</div>
              </div>
            </div>
            <div style={{background:'rgba(255,215,0,0.1)',border:'1px solid rgba(255,215,0,0.2)',borderRadius:10,padding:'6px 12px'}}>
              <span style={{fontSize:11,fontWeight:700,color:'#FFD700'}}>Confirmed</span>
            </div>
          </div>
        </div>

        {/* Car visual banner */}
        <div style={{margin:'16px 16px 0',borderRadius:16,overflow:'hidden',height:120,position:'relative',boxShadow:'0 8px 24px rgba(0,0,0,0.4)'}}>
          <img src={selectedCar.img} alt={selectedCar.name} style={{width:'100%',height:'100%',objectFit:'cover',filter:'brightness(0.5)'}}/>
          <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,transparent 20%,rgba(0,0,0,0.8) 100%)'}}/>
          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:'#fff'}}>{selectedCar.name}</div>
              <div style={{fontSize:11,color:T.gray500,marginTop:2}}>{selectedCar.type} · {selectedCar.seats} passengers</div>
            </div>
            <div style={{fontSize:22,fontWeight:900,color:G.gold,textShadow:'0 2px 8px rgba(0,0,0,0.5)'}}>${totalPrice}</div>
          </div>
        </div>

        {/* Trip Details */}
        <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:16,border:`1px solid ${G.goldBorder}`}}>
          <div style={{fontSize:10,fontWeight:700,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:12}}>Trip Details</div>
          <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,paddingTop:2}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:'#FFD700',border:'2px solid rgba(255,215,0,0.3)'}}/>
              <div style={{width:1.5,height:28,background:'rgba(255,215,0,0.15)'}}/>
              <div style={{width:10,height:10,borderRadius:'50%',background:G.gold,border:'2px solid rgba(255,215,0,0.3)'}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:G.textDim,marginBottom:2}}>PICKUP</div>
                <div style={{fontSize:13,fontWeight:600,color:G.text}}>{from}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:G.textDim,marginBottom:2}}>DROP-OFF</div>
                <div style={{fontSize:13,fontWeight:600,color:G.text}}>{to}</div>
              </div>
            </div>
          </div>
          <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${G.border}`,display:'flex',gap:16}}>
            <div>
              <div style={{fontSize:10,color:G.textDim}}>DATE</div>
              <div style={{fontSize:12,fontWeight:600,color:G.text,marginTop:2}}>{date}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:G.textDim}}>TIME</div>
              <div style={{fontSize:12,fontWeight:600,color:G.text,marginTop:2}}>{time}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:G.textDim}}>PASSENGERS</div>
              <div style={{fontSize:12,fontWeight:600,color:G.text,marginTop:2}}>{pax}</div>
            </div>
          </div>
        </div>

        {/* Chauffeur Live Location Map */}
        <VipChauffeurMap from={from} ch={ch} G={G} confirmedAt={confirmedAt}/>

        {/* Driver Status & Wait Timer */}
        <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:16,border:`1px solid ${G.goldBorder}`}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <div style={{position:'relative'}}>
              <Avatar initials={ch.avatar} size={48} bg="rgba(255,215,0,0.15)"/>
              <div style={{position:'absolute',bottom:-2,right:-2,width:14,height:14,borderRadius:'50%',background:'#FFD700',
                border:'2px solid #141420',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name="check" size={8} color="#1a1a2e"/>
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:G.text}}>{ch.name}</div>
              <div style={{fontSize:11,color:G.textSub}}>{ch.car} · {ch.rating} rating</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>setShowChat(true)} style={{width:36,height:36,borderRadius:10,background:'rgba(255,215,0,0.08)',
                border:`1px solid ${G.goldBorder2}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <Icon name="chat" size={16} color={G.gold}/>
              </button>
              <button onClick={()=>setShowCall(true)} style={{width:36,height:36,borderRadius:10,background:'rgba(255,215,0,0.08)',
                border:`1px solid ${G.goldBorder2}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <Icon name="call" size={16} color={G.gold}/>
              </button>
            </div>
          </div>

          {/* Driver Waiting Timer */}
          {driverArrived?(
            <div style={{background:'linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,215,0,0.02))',borderRadius:12,padding:'14px 16px',
              border:`1px solid ${G.goldBorder2}`}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:36,height:36,borderRadius:10,background:'rgba(255,215,0,0.1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon name="local_taxi" size={18} color={G.gold}/>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:G.text}}>Chauffeur is waiting</div>
                    <div style={{fontSize:10,color:G.textSub}}>Your driver has arrived at the pickup</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:20,fontWeight:900,color:G.gold,fontVariantNumeric:'tabular-nums'}}>{driverWaitTime}</div>
                  <div style={{fontSize:9,color:G.textDim}}>wait time</div>
                </div>
              </div>
            </div>
          ):(
            <div style={{background:'rgba(255,255,255,0.02)',borderRadius:12,padding:'12px 16px',border:`1px solid ${G.border}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:32,height:32,borderRadius:8,background:'rgba(255,215,0,0.1)',display:'flex',alignItems:'center',justifyContent:'center',
                  animation:'pulse 2s infinite'}}>
                  <Icon name="directions_car" size={16} color="#FFD700"/>
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:G.text}}>Chauffeur is preparing</div>
                  <div style={{fontSize:10,color:G.textSub}}>Will arrive at pickup location shortly</div>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Cancellation Timer */}
        <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:14,
          border:`1px solid ${canCancelFree?'rgba(245,158,11,0.15)':'rgba(255,107,107,0.1)'}`}}>
          {canCancelFree?(
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:40,height:40,borderRadius:10,background:'rgba(245,158,11,0.1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name="timer" size={20} color="#F59E0B"/>
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:G.text}}>Free Cancel: <span style={{color:'#F59E0B',fontVariantNumeric:'tabular-nums'}}>{cancelCountdown}</span></div>
                  <div style={{fontSize:10,color:G.textSub}}>Full refund if cancelled now</div>
                </div>
              </div>
              <button onClick={()=>{clearBooking()}}
                style={{padding:'10px 18px',background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.25)',
                  borderRadius:10,color:'#F59E0B',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                Cancel
              </button>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:'rgba(255,107,107,0.08)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name="block" size={18} color="#FF6B6B"/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'rgba(255,107,107,0.9)'}}>Free cancellation expired</div>
                <div style={{fontSize:10,color:G.textSub}}>Cancellation is now non-refundable</div>
              </div>
              <button onClick={()=>{if(confirm('The free cancellation window has expired. You will NOT receive a refund. Cancel anyway?'))clearBooking()}}
                style={{padding:'8px 14px',background:'rgba(255,107,107,0.08)',border:'1px solid rgba(255,107,107,0.2)',
                  borderRadius:10,color:'#FF6B6B',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                Cancel
              </button>
            </div>
          )}
        </div>

        {/* Add-ons if any */}
        {addonsTotal>0&&(
          <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:14,border:`1px solid ${G.border}`}}>
            <div style={{fontSize:10,fontWeight:600,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:8}}>Add-on Services</div>
            {Object.keys(addons).filter(k=>addons[k]).map(k=>{
              const names={meetgreet:'Meet & Greet',childseat:'Child Car Seat',luggage:'Extra Luggage',stopover:'Additional Stop',flowers:'Flowers & Champagne',redcarpet:'Red Carpet Arrival'};
              return(<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}>
                <span style={{fontSize:11,color:G.textSub}}>{names[k]}</span>
                <span style={{fontSize:11,fontWeight:600,color:G.gold}}>+${ADDON_PRICES[k]}</span>
              </div>);
            })}
          </div>
        )}

        {/* Bottom action */}
        <div style={{padding:'16px 16px'}}>
          <button onClick={()=>setView('tracking')}
            style={{width:'100%',padding:'14px 0',background:'linear-gradient(135deg,#FFD700,#FFC107)',color:'#1a1a2e',border:'none',
              borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',boxShadow:'0 4px 16px rgba(255,215,0,0.2)',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <Icon name="arrow_back" size={16} color="#1a1a2e"/>Back to Booking
          </button>
        </div>

        {/* Chat Modal */}
        {showChat&&(
          <div style={{position:'fixed',inset:0,zIndex:999,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
            <div onClick={()=>setShowChat(false)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)'}}/>
            <div className="fade-up" style={{position:'relative',background:'#141420',borderRadius:'20px 20px 0 0',maxHeight:'75vh',display:'flex',flexDirection:'column'}}>
              <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(255,215,0,0.1)',display:'flex',alignItems:'center',gap:12}}>
                <Avatar initials={ch.avatar} size={36} bg="rgba(255,215,0,0.15)"/>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:'#fff'}}>{ch.name}</div><div style={{fontSize:10,color:'#FFD700'}}>Online</div></div>
                <button onClick={()=>setShowChat(false)} style={{background:'rgba(255,255,255,0.06)',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                  <Icon name="close" size={16} color="rgba(255,255,255,0.5)"/></button>
              </div>
              <div style={{flex:1,overflowY:'auto',padding:'16px 20px',minHeight:200,maxHeight:'50vh'}}>
                {chatMsgs.map((m,i)=>(<div key={i} style={{display:'flex',justifyContent:m.from==='me'?'flex-end':'flex-start',marginBottom:10}}>
                  <div style={{maxWidth:'75%',padding:'10px 14px',borderRadius:m.from==='me'?'14px 14px 4px 14px':'14px 14px 14px 4px',
                    background:m.from==='me'?'linear-gradient(135deg,#FFD700,#FFC107)':'rgba(255,255,255,0.06)',color:m.from==='me'?'#1a1a2e':'#fff'}}>
                    <div style={{fontSize:13,lineHeight:1.5}}>{m.text}</div><div style={{fontSize:9,marginTop:4,opacity:0.6,textAlign:'right'}}>{m.t}</div>
                  </div></div>))}
              </div>
              <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,215,0,0.1)',display:'flex',gap:8}}>
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)} placeholder="Type a message..."
                  onKeyDown={e=>e.key==='Enter'&&sendChat()}
                  style={{flex:1,padding:'10px 14px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:10,color:'#fff',fontSize:13,outline:'none',fontFamily:'inherit'}}/>
                <button onClick={sendChat} style={{width:40,height:40,borderRadius:10,background:chatInput.trim()?'linear-gradient(135deg,#FFD700,#FFC107)':'rgba(255,255,255,0.04)',
                  border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:chatInput.trim()?'pointer':'default'}}>
                  <Icon name="send" size={18} color={chatInput.trim()?'#1a1a2e':'rgba(255,255,255,0.2)'}/></button>
              </div>
            </div>
          </div>
        )}

        {/* Call Modal */}
        {showCall&&(
          <div style={{position:'fixed',inset:0,zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <div onClick={()=>setShowCall(false)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.8)'}}/>
            <div className="fade-up" style={{position:'relative',background:'#141420',borderRadius:20,padding:'32px 24px',textAlign:'center',width:'100%',maxWidth:300,border:'1px solid rgba(255,215,0,0.1)'}}>
              <Avatar initials={ch.avatar} size={64} bg="rgba(255,215,0,0.15)"/>
              <div style={{fontSize:18,fontWeight:800,color:'#fff',marginTop:12}}>{ch.name}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.4)',marginTop:4}}>VIP Chauffeur</div>
              <div style={{fontSize:16,fontWeight:600,color:G.gold,marginTop:8,letterSpacing:1}}>+1 (217) 555-0{ch.id}42</div>
              <div style={{display:'flex',gap:10,marginTop:20}}>
                <button onClick={()=>setShowCall(false)} style={{flex:1,padding:'12px 0',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:12,color:T.gray400,fontWeight:600,fontSize:13,cursor:'pointer'}}>Cancel</button>
                <button onClick={()=>{setShowCall(false)}}
                  style={{flex:1,padding:'12px 0',background:'linear-gradient(135deg,#FFD700,#FFC107)',border:'none',borderRadius:12,color:'#1a1a2e',fontWeight:700,fontSize:13,cursor:'pointer',boxShadow:'0 4px 12px rgba(255,215,0,0.3)',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Icon name="call" size={16} color="#1a1a2e"/>Call Now</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* Fleet view (default) */
  return(
    <div style={{height:'100%',overflowY:'auto',background:G.bg,paddingBottom:100}}>
      {/* Active booking banner */}
      {booked&&view==='fleet'&&(
        <div onClick={()=>setView('tracking')} style={{margin:'0 16px',marginTop:16,background:'linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,215,0,0.03))',
          borderRadius:14,padding:14,border:`1px solid ${G.goldBorder2}`,cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,borderRadius:10,background:`${bookingStatus==='confirmed'?'#FFD700':'#F59E0B'}15`,
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon name={bookingStatus==='confirmed'?'check_circle':'hourglass_top'} size={20} color={bookingStatus==='confirmed'?'#FFD700':'#F59E0B'}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:G.text}}>Active VIP Booking</div>
            <div style={{fontSize:10,color:G.textSub}}>{selectedCar?.name} · {from} → {to} · {date}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:bookingStatus==='confirmed'?'#FFD700':'#F59E0B'}}/>
            <span style={{fontSize:10,fontWeight:600,color:bookingStatus==='confirmed'?'#FFD700':'#F59E0B'}}>
              {bookingStatus==='confirmed'?'Confirmed':'Pending'}
            </span>
          </div>
          <Icon name="chevron_right" size={18} color={G.textDim}/>
        </div>
      )}
      {/* Hero */}
      <div style={{background:G.hero,padding:'48px 20px 32px',
        borderRadius:`0 0 ${T.radiusXl}px ${T.radiusXl}px`,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,215,0,0.06),transparent)'}}/>
        <div style={{position:'absolute',bottom:-40,left:-20,width:150,height:150,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,215,0,0.04),transparent)'}}/>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,215,0,0.1)',border:'1px solid rgba(255,215,0,0.2)',borderRadius:20,
          padding:'6px 14px',cursor:'pointer',color:G.gold,fontSize:12,fontWeight:600,marginBottom:20,position:'relative',zIndex:2}}>
          <Icon name="arrow_back" size={16} color={G.gold}/>Back
        </button>
        <div style={{position:'relative',zIndex:2}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <img src="/demos/assets/vip-logo.png" alt="VIP" style={{width:52,height:52,borderRadius:14,
              filter:'drop-shadow(0 4px 16px rgba(255,215,0,0.4))',objectFit:'cover'}}/>
            <div>
              <span style={{fontSize:11,fontWeight:700,color:G.gold,textTransform:'uppercase',letterSpacing:2}}>Black Collection</span>
              <h1 style={{color:G.text,fontSize:26,fontWeight:900,marginTop:2,lineHeight:1.2}}>VIP Luxury Rides</h1>
            </div>
          </div>
          <p style={{color:G.textSub,fontSize:13,lineHeight:1.5}}>Travel in style with professional chauffeurs and premium vehicles</p>
        </div>
      </div>

      {/* Features strip */}
      <div style={{display:'flex',gap:0,margin:'16px 16px 0',background:G.card,borderRadius:14,overflow:'hidden',border:`1px solid ${G.goldBorder}`}}>
        {[{icon:'verified_user',label:'Vetted Chauffeurs'},{icon:'auto_awesome',label:'Premium Fleet'},{icon:'schedule',label:'On-Time Guarantee'}].map((f,i)=>(
          <div key={i} style={{flex:1,padding:'14px 8px',textAlign:'center',borderRight:i<2?`1px solid rgba(255,215,0,0.08)`:'none'}}>
            <Icon name={f.icon} size={18} color={G.gold}/>
            <div style={{fontSize:9,fontWeight:600,color:G.textSub,marginTop:4}}>{f.label}</div>
          </div>
        ))}
      </div>

      {/* Car Fleet */}
      <div style={{padding:'20px 16px 0'}}>
        <div style={{fontSize:12,fontWeight:700,color:G.textDim,textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>Select Your Vehicle</div>
        {VIP_CARS.map((car,i)=>{
          const active=selectedCar&&selectedCar.id===car.id;
          return(
            <div key={car.id} className="fade-up" onClick={()=>setSelectedCar(active?null:car)}
              style={{background:active?G.cardActive:G.card,borderRadius:16,padding:18,marginBottom:10,
                border:`1.5px solid ${active?G.goldBorder3:G.border}`,cursor:'pointer',transition:'all .25s',
                animationDelay:`${i*50}ms`}}>
              {/* Car image */}
              <div style={{width:'100%',height:140,borderRadius:12,overflow:'hidden',marginBottom:12,position:'relative'}}>
                <img src={car.img} alt={car.name} style={{width:'100%',height:'100%',objectFit:'cover',
                  filter:active?'brightness(1.1)':'brightness(0.7)',transition:'filter .3s'}}/>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(0deg,rgba(0,0,0,0.7) 0%,transparent 60%)'}}/>
                <div style={{position:'absolute',top:8,right:8,display:'flex',alignItems:'center',gap:4,background:'rgba(0,0,0,0.5)',
                  backdropFilter:'blur(6px)',borderRadius:20,padding:'4px 10px'}}>
                  <div style={{width:5,height:5,borderRadius:'50%',background:G.gold}}/>
                  <span style={{fontSize:10,fontWeight:600,color:G.gold}}>{car.type}</span>
                </div>
                <div style={{position:'absolute',bottom:8,left:10}}>
                  <div style={{fontSize:15,fontWeight:800,color:'#fff',textShadow:'0 2px 8px rgba(0,0,0,0.5)'}}>{car.name}</div>
                  <div style={{fontSize:10,color:T.gray600}}>Up to {car.seats} passengers</div>
                </div>
                <div style={{position:'absolute',bottom:8,right:10,textAlign:'right'}}>
                  <div style={{fontSize:18,fontWeight:900,color:G.gold,textShadow:'0 2px 8px rgba(0,0,0,0.5)'}}>{car.price}</div>
                  <div style={{fontSize:8,color:T.gray400}}>from / trip</div>
                </div>
              </div>
              {active&&(
                <div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
                    {car.features.map((f,j)=>(
                      <div key={j} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:20,
                        background:G.goldBg,border:`1px solid ${G.goldBorder}`}}>

            {icon:'local_drink',text:'Complimentary refreshments'},
            {icon:'wifi',text:'High-speed WiFi & device charging'},

            {icon:'access_time',text:'Free wait time up to 45 minutes'},

    </div>
  );
};

const _fmtFlightDate=(offsetDays)=>{const d=new Date();d.setDate(d.getDate()+offsetDays);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};
const _today=_fmtFlightDate(0);const _tomorrow=_fmtFlightDate(1);
const MOCK_FLIGHTS=[

  {flight:'UA 5520',airline:'United Airlines',logo:'U',from:'Midway (MDW)',to:'Champaign (CMI)',depart:'5:00 PM',arrive:'6:12 PM',date:_tomorrow,gate:'A3',terminal:'Terminal 1',status:'Scheduled',statusColor:'#94A3B8',aircraft:'Boeing 737-700',duration:'1h 12m',progress:0},
  {flight:'DL 4410',airline:'Delta Air Lines',logo:'D',from:"O'Hare (ORD)",to:'Champaign (CMI)',depart:'8:45 PM',arrive:'9:50 PM',date:_today,gate:'C22',terminal:'Terminal 2',status:'Boarding',statusColor:'#8B5CF6',aircraft:'CRJ-900',duration:'1h 05m',progress:5},
  {flight:'UA 2198',airline:'United Airlines',logo:'U',from:'Champaign (CMI)',to:"O'Hare (ORD)",depart:'7:00 AM',arrive:'8:05 AM',date:_tomorrow,gate:'--',terminal:'Terminal 2',status:'Scheduled',statusColor:'#94A3B8',aircraft:'Embraer E145',duration:'1h 05m',progress:0},
];
const AIRLINE_COLORS={'U':'#002244','A':'#E31837','D':'#003366','W':'#304CB2','S':'#FFE600','F':'#008522'};

const AIRLABS_KEY='ed94cbcf-8f61-4182-95e0-70e33f7726e3';
const AIRLABS_AIRPORTS=['ORD','MDW','CMI','BMI'];
const parseAirlabsStatus=(s)=>{
  if(!s)return{status:'Scheduled',color:'#94A3B8',progress:0};
  const sl=s.toLowerCase();
  if(sl==='landed'||sl==='arrived')return{status:'Arrived',color:'#3B82F6',progress:100};
  if(sl==='en-route'||sl==='active')return{status:'In Flight',color:'#00C9A7',progress:55};
  if(sl==='scheduled')return{status:'Scheduled',color:'#94A3B8',progress:0};
  if(sl.includes('delay'))return{status:'Delayed',color:'#F59E0B',progress:30};
  if(sl==='cancelled')return{status:'Cancelled',color:'#EF4444',progress:0};
  return{status:s,color:'#94A3B8',progress:0};
};
const formatFlightTime=(iso)=>{
  if(!iso)return'--';
  const d=new Date(iso);
  if(isNaN(d))return iso;
  let h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';
  h=h%12||12;
  return `${h}:${m.toString().padStart(2,'0')} ${ap}`;
};
const formatFlightDate=(iso)=>{
  if(!iso)return'';
  const d=new Date(iso);
  if(isNaN(d))return'';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
};
const airportName=(iata)=>({ORD:"O'Hare (ORD)",MDW:'Midway (MDW)',CMI:'Champaign (CMI)',BMI:'Bloomington (BMI)'})[iata]||iata||'--';
const airlineLogo=(name)=>{
  if(!name)return'?';
  if(name.includes('United'))return'U';
  if(name.includes('American'))return'A';
  if(name.includes('Delta'))return'D';
  if(name.includes('Southwest'))return'W';
  if(name.includes('Spirit'))return'S';
  if(name.includes('Frontier'))return'F';
  return name.charAt(0).toUpperCase();
};

const FlightTracker=({onBack,onBook})=>{
  const [query,setQuery]=useState('');
  const [selected,setSelected]=useState(null);
  const [searched,setSearched]=useState(false);
  const [liveProgress,setLiveProgress]=useState({});
  const [liveFlights,setLiveFlights]=useState(null);
  const [loading,setLoading]=useState(true);
  const [apiError,setApiError]=useState(false);
  const [activeFilter,setActiveFilter]=useState('all');

  /* Fetch real flights from AirLabs */
  useEffect(()=>{
    let cancelled=false;
    const fetchFlights=async()=>{
      setLoading(true);
      try{
        const results=[];
        for(const apt of AIRLABS_AIRPORTS){
          const [depRes,arrRes]=await Promise.all([
            fetch(`https://airlabs.co/api/v9/schedules?dep_iata=${apt}&api_key=${AIRLABS_KEY}`).then(r=>r.json()).catch(()=>null),
            fetch(`https://airlabs.co/api/v9/schedules?arr_iata=${apt}&api_key=${AIRLABS_KEY}`).then(r=>r.json()).catch(()=>null)
          ]);
          const process=(data,type)=>{
            if(!data||!data.response)return;
            data.response.slice(0,15).forEach(f=>{
              const st=parseAirlabsStatus(f.status);
              const flightNum=(f.airline_iata||'')+(f.flight_number||'');
              if(results.find(r=>r.flight===flightNum))return;
              const depTime=f.dep_time||f.dep_estimated||f.dep_actual||'';
              const arrTime=f.arr_time||f.arr_estimated||f.arr_actual||'';
              results.push({
                flight:flightNum||'--',
                airline:f.airline_name||f.airline_iata||'Airline',
                logo:airlineLogo(f.airline_name||''),
                from:airportName(f.dep_iata),
                to:airportName(f.arr_iata),
                dep_iata:f.dep_iata||'',
                arr_iata:f.arr_iata||'',
                depart:formatFlightTime(depTime),
                arrive:formatFlightTime(arrTime),
                date:formatFlightDate(depTime||arrTime),
                gate:f.dep_gate||f.arr_gate||'--',
                terminal:f.dep_terminal?'Terminal '+f.dep_terminal:f.arr_terminal?'Terminal '+f.arr_terminal:'--',
                status:st.status,
                statusColor:st.color,
                aircraft:f.aircraft_icao||'--',
                duration:depTime&&arrTime?(()=>{const ms=new Date(arrTime)-new Date(depTime);if(ms<=0||isNaN(ms))return'--';const h=Math.floor(ms/3600000);const m=Math.round((ms%3600000)/60000);return h>0?`${h}h ${m.toString().padStart(2,'0')}m`:`${m}m`;})():'--',
                progress:st.progress,
                _raw:f
              });
            });
          };
          process(depRes,'dep');
          process(arrRes,'arr');
        }
        if(!cancelled){
          if(results.length>0){
            setLiveFlights(results);
            setApiError(false);
          }else{
            setApiError(true);
          }
          setLoading(false);
        }
      }catch(e){
        if(!cancelled){setApiError(true);setLoading(false);}
      }
    };
    fetchFlights();
    const iv=setInterval(fetchFlights,120000);
    return()=>{cancelled=true;clearInterval(iv);};
  },[]);

  const flights=liveFlights||MOCK_FLIGHTS;
  const isLive=!!liveFlights;

  /* Simulate live progress for mock in-flight */
  useEffect(()=>{
    if(isLive)return;
    const iv=setInterval(()=>{
      setLiveProgress(prev=>{
        const next={...prev};
        MOCK_FLIGHTS.forEach(f=>{
          if(f.status==='Delayed 25m'||f.status==='Boarding'){
            const cur=next[f.flight]||f.progress;
            if(cur<95) next[f.flight]=cur+Math.random()*2;
          }
        });
        return next;
      });
    },3000);
    return ()=>clearInterval(iv);
  },[isLive]);

  const applyFilter=(list)=>{
    if(activeFilter==='departures')return list.filter(f=>AIRLABS_AIRPORTS.includes(f.dep_iata)||f.from.includes('Champaign')||f.from.includes('CMI'));
    if(activeFilter==='arrivals')return list.filter(f=>AIRLABS_AIRPORTS.includes(f.arr_iata)||f.to.includes('Champaign')||f.to.includes('CMI'));
    if(activeFilter==='delayed')return list.filter(f=>f.status.toLowerCase().includes('delay')||f.statusColor==='#F59E0B');
    return list;
  };

  const filtered=applyFilter(query.trim()?flights.filter(f=>
    f.flight.toLowerCase().replace(/\s/g,'').includes(query.toLowerCase().replace(/\s/g,''))||
    f.airline.toLowerCase().includes(query.toLowerCase())||
    f.from.toLowerCase().includes(query.toLowerCase())||
    f.to.toLowerCase().includes(query.toLowerCase())
  ):flights);

  const getProgress=(f)=>liveProgress[f.flight]??f.progress;

  /* Detail View */
  if(selected){
    const f=selected;
    const prog=getProgress(f);
    return(
      <div style={{height:'100%',overflowY:'auto',background:T.gray50,paddingBottom:100}}>

          <button onClick={()=>setSelected(null)} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,0.15)',border:'none',borderRadius:20,

            <Icon name="arrow_back" size={16} color="#fff"/>Back
          </button>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
            <div style={{width:40,height:40,borderRadius:10,background:AIRLINE_COLORS[f.logo]||'#333',display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:18,fontWeight:900,color:'#fff'}}>{f.logo}</div>
            <div>
              <div style={{color:'#fff',fontSize:20,fontWeight:800}}>{f.flight}</div>
              <div style={{color:T.gray600,fontSize:12}}>{f.airline} · {f.aircraft}</div>
            </div>
          </div>
          <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'rgba(255,255,255,0.15)',borderRadius:20,padding:'4px 12px',marginTop:8}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:f.statusColor}}/>
            <span style={{color:'#fff',fontSize:12,fontWeight:600}}>{f.status}</span>
          </div>
        </div>

        {/* Flight Route Card */}
        <div style={{margin:'-36px 16px 0',background:T.white,borderRadius:16,padding:'20px 18px',boxShadow:T.shadow,position:'relative',zIndex:2}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:24,fontWeight:800,color:T.gray800}}>{f.depart.replace(/ (AM|PM)/,'')}<span style={{fontSize:12,fontWeight:600,color:T.gray500}}>{f.depart.includes('AM')?' AM':' PM'}</span></div>
              <div style={{fontSize:12,fontWeight:600,color:T.gray500,marginTop:2}}>{f.from}</div>
            </div>
            <div style={{flex:1,padding:'6px 16px',display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{fontSize:10,color:T.gray500,fontWeight:600,marginBottom:4}}>{f.duration}</div>
              <div style={{width:'100%',height:3,background:T.blue50,borderRadius:3,position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${prog}%`,background:f.statusColor==='#F59E0B'?'linear-gradient(90deg,#F59E0B,#FBBF24)':
                  f.statusColor==='#00C9A7'?'linear-gradient(90deg,#00C9A7,#00E6BE)':'linear-gradient(90deg,#3B82F6,#60A5FA)',borderRadius:3,transition:'width 1s ease'}}/>
              </div>
              <Icon name="flight" size={16} color={T.blue500} style={{marginTop:4,transform:'rotate(90deg)'}}/>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:24,fontWeight:800,color:T.gray800}}>{f.arrive.replace(/ (AM|PM)/,'')}<span style={{fontSize:12,fontWeight:600,color:T.gray500}}>{f.arrive.includes('AM')?' AM':' PM'}</span></div>
              <div style={{fontSize:12,fontWeight:600,color:T.gray500,marginTop:2}}>{f.to}</div>
            </div>
          </div>
        </div>

        {/* Flight Details Grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,margin:'16px 16px 0'}}>
          {[
            {icon:'calendar_today',label:'Date',value:f.date},
            {icon:'door_front',label:'Gate',value:f.gate},
            {icon:'domain',label:'Terminal',value:f.terminal},
            {icon:'flight',label:'Aircraft',value:f.aircraft},
          ].map((d,i)=>(
            <div key={i} style={{background:T.white,borderRadius:12,padding:'14px 14px',boxShadow:T.shadow,border:`1px solid ${T.gray100}`}}>

            </div>
          ))}
        </div>

        {/* Live Status Timeline */}
        <div style={{margin:'16px 16px 0',background:T.white,borderRadius:14,padding:'18px 16px',boxShadow:T.shadow,border:`1px solid ${T.gray100}`}}>
          <div style={{fontSize:13,fontWeight:700,color:T.gray800,marginBottom:14}}>Flight Status</div>
          {['Scheduled','Boarding','In Flight','Descending','Arrived'].map((step,i)=>{
            const stepProg=[0,5,30,75,100];

            return(
              <div key={i} style={{display:'flex',gap:12,marginBottom:i<4?0:0}}>

let _reqAudio=null;
const playRequestSound=()=>{
  try{
    if(_reqAudio){_reqAudio.pause();_reqAudio.currentTime=0;}
    if(navigator.vibrate)navigator.vibrate([60,30,60]);
    const audio=new Audio('assets/notification.mp3');
    audio.volume=0.8;
    audio.play().catch(()=>{});
    _reqAudio=audio;
    setTimeout(()=>{if(_reqAudio===audio){audio.pause();audio.currentTime=0;_reqAudio=null;}},7000);
  }catch(e){}
};
const stopRequestSound=()=>{if(_reqAudio){_reqAudio.pause();_reqAudio.currentTime=0;_reqAudio=null;}};
// Shared incoming request state (used across driver components)
let _incomingListeners=[];
const useIncomingRequests=(isOnline)=>{
  const [queue,setQueue]=useState(DRIVER_REQUESTS_INITIAL);
  const [notification,setNotification]=useState(null);
  const timersRef=useRef([]);
  const pendingRef=useRef([]); // queued notifications waiting to show
  const dismissTimerRef=useRef(null);
  const isOnlineRef=useRef(isOnline);
  isOnlineRef.current=isOnline;

  // Show next pending notification (one at a time)
  const showNext=()=>{
    if(pendingRef.current.length===0)return;
    const req=pendingRef.current.shift();
    setNotification(req);
    playRequestSound();
    if(dismissTimerRef.current)clearTimeout(dismissTimerRef.current);
    dismissTimerRef.current=setTimeout(()=>{
      setNotification(n=>n&&n.id===req.id?null:n);
      // After auto-dismiss, show next if any
      setTimeout(()=>showNext(),300);
    },10000);
  };

  const pushNotification=(req)=>{
    setQueue(prev=>[req,...prev]);
    // If no notification showing, show immediately; otherwise queue it
    setNotification(current=>{
      if(current){
        pendingRef.current.push(req);
        return current; // keep current
      }
      // Show this one now
      playRequestSound();
      if(dismissTimerRef.current)clearTimeout(dismissTimerRef.current);
      dismissTimerRef.current=setTimeout(()=>{
        setNotification(n=>n&&n.id===req.id?null:n);
        setTimeout(()=>showNext(),300);
      },10000);
      return req;
    });
  };

  const dismiss=()=>{
    stopRequestSound();
    if(dismissTimerRef.current)clearTimeout(dismissTimerRef.current);
    setNotification(null);
    // Show next queued notification after brief delay
    setTimeout(()=>showNext(),300);
  };

  useEffect(()=>{
    // Clear timers when going offline
    if(!isOnline){
      timersRef.current.forEach(clearTimeout);timersRef.current=[];
      pendingRef.current=[];
      if(dismissTimerRef.current)clearTimeout(dismissTimerRef.current);
      setNotification(null);
      return;
    }
    // Schedule incoming mock requests (spaced out, one at a time)
    const delays=[8000,18000,30000];
    delays.forEach((delay,i)=>{
      if(i>=DRIVER_REQUESTS_INCOMING.length)return;
      const t=setTimeout(()=>{
        if(!isOnlineRef.current)return;
        pushNotification(DRIVER_REQUESTS_INCOMING[i]);
      },delay);
      timersRef.current.push(t);
    });
    return()=>{timersRef.current.forEach(clearTimeout);timersRef.current=[];};
  },[isOnline]);

  // Listen for real ride requests from rider page via BroadcastChannel
  useEffect(()=>{
    if(typeof BroadcastChannel==='undefined')return;
    const ch=new BroadcastChannel('chambana-rides');
    ch.onmessage=(e)=>{
      if(e.data&&e.data.type==='RIDE_REQUEST'){
        // Only receive if driver is online
        if(!isOnlineRef.current)return;
        pushNotification(e.data.request);
      }
    };
    return()=>ch.close();
  },[]);

  return{queue,notification,dismissNotification:dismiss};
};

      const map=L.map(el,{zoomControl:false,attributionControl:false}).setView([center.lat,center.lng],13);
      L.mapboxGL({
        accessToken:'pk.eyJ1IjoiYWltYXIwMiIsImEiOiJjbWo4b3h6cWEwMm9nM2dwb2F0cDM2YzEwIn0.nEvQyBShM1XbL_66Brxirg',
        style:'mapbox://styles/mapbox/streets-v12'
      }).addTo(map);
      L.control.zoom({position:'bottomright'}).addTo(map);
      mapObjRef.current=map;

      // Driver location marker
      if(userLoc){
        var dm=L.marker([userLoc.lat,userLoc.lng],{zIndexOffset:600});
        dm.addTo(map);
        driverMarkerRef.current=dm;
      }
    }catch(e){console.error('DriverMap init error:',e);}
    return function(){if(mapObjRef.current){mapObjRef.current.remove();mapObjRef.current=null;}};
  },[]);

  // Update driver pin color based on online/offline
  useEffect(()=>{
    if(!driverMarkerRef.current)return;
    var col=isOnline?'#00C9A7':'#EF4444';
    var glow=isOnline?'rgba(0,201,167,0.4)':'rgba(239,68,68,0.4)';
    var pulseCol=isOnline?'rgba(0,201,167,0.25)':'rgba(239,68,68,0.25)';
    var ic=L.divIcon({className:'',iconSize:[32,32],iconAnchor:[16,16],
      html:'<div style="position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center">'+
        '<div style="position:absolute;width:100%;height:100%;border-radius:50%;background:'+pulseCol+';animation:pinPulse 2s ease-out infinite"></div>'+
        '<div style="width:14px;height:14px;border-radius:50%;background:'+col+';border:3px solid #fff;box-shadow:0 2px 8px '+glow+';position:relative;z-index:1"></div>'+
      '</div>'});
    driverMarkerRef.current.setIcon(ic);
  },[isOnline]);

  // Add/remove request markers based on online status
  useEffect(()=>{
    const map=mapObjRef.current;
    if(!map)return;
    // Clear old markers
    reqMarkersRef.current.forEach(function(m){map.removeLayer(m)});
    reqMarkersRef.current=[];
    if(!isOnline)return;
    // Generate locations for all requests (original 4 use DRIVER_REQUEST_LOCS, new ones get random nearby positions)
    var allLocs={};
    DRIVER_REQUEST_LOCS.forEach(function(l,i){if(DRIVER_REQUESTS_INITIAL[i])allLocs[DRIVER_REQUESTS_INITIAL[i].id]=l;});
    requests.forEach(function(r){
      if(!allLocs[r.id]){allLocs[r.id]={lat:40.1100+(Math.random()*0.02-0.01),lng:-88.2300+(Math.random()*0.02-0.01)};}
    });
    // Add flashing purple customer request markers
    requests.forEach(function(r){
      if(accepted[r.id]||declined[r.id])return;
      var loc=allLocs[r.id];
      if(!loc)return;
      var isNew=r.posted==='Just now';
      var html='<div style="position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer">'+
        '<div style="position:absolute;width:100%;height:100%;border-radius:50%;background:rgba(139,92,246,0.25);animation:reqPulse 1.8s ease-out infinite"></div>'+
        '<div style="position:absolute;width:75%;height:75%;border-radius:50%;background:rgba(139,92,246,0.15);animation:reqPulse 1.8s ease-out 0.6s infinite"></div>'+
        '<img src="'+r.photo+'" style="width:30px;height:30px;border-radius:50%;border:2.5px solid '+(isNew?'#8B5CF6':'#fff')+';box-shadow:0 2px 10px rgba(139,92,246,0.5);object-fit:cover;position:relative;z-index:2;animation:reqFlash 2s ease-in-out infinite"/>'+
        '<div style="position:absolute;bottom:-8px;background:'+(isNew?'linear-gradient(135deg,#8B5CF6,#A78BFA)':'#fff')+';padding:1px 6px;border-radius:6px;font-size:8px;font-weight:700;color:'+(isNew?'#fff':'#7C3AED')+';box-shadow:0 1px 4px rgba(0,0,0,0.15);font-family:Inter,sans-serif;white-space:nowrap;z-index:3">'+r.fare+'</div>'+
      '</div>';
      var ic=L.divIcon({className:'',iconSize:[44,52],iconAnchor:[22,22],html:html});
      var m=L.marker([loc.lat,loc.lng],{icon:ic,zIndexOffset:isNew?600:500}).addTo(map);
      m.on('click',function(){setSelectedReq(Object.assign({},r,{lat:loc.lat,lng:loc.lng}));});
      reqMarkersRef.current.push(m);
    });
    // Fit bounds
    var pts=[];
    requests.forEach(function(r){
      if(accepted[r.id]||declined[r.id])return;
      var loc=allLocs[r.id];
      if(loc)pts.push([loc.lat,loc.lng]);
    });
    if(userLoc)pts.push([userLoc.lat,userLoc.lng]);
    if(pts.length>1)map.fitBounds(pts,{padding:[60,60]});
  },[isOnline,accepted,declined,requests]);

  var activeReq=selectedReq&&!accepted[selectedReq.id]&&!declined[selectedReq.id]?selectedReq:null;
  var reqCount=requests.filter(function(r){return !accepted[r.id]&&!declined[r.id]}).length;

  return(
    <div style={{height:'100%',position:'relative',background:'#f0f0f0'}}>
      <style>{`
        @keyframes reqPulse{0%{transform:scale(0.7);opacity:0.8}100%{transform:scale(1.8);opacity:0}}
        @keyframes reqFlash{0%,100%{box-shadow:0 2px 10px rgba(139,92,246,0.5)}50%{box-shadow:0 2px 16px rgba(139,92,246,0.9),0 0 24px rgba(139,92,246,0.4)}}
        @keyframes reqSlideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
      `}</style>
      <div ref={mapRef} style={{position:'absolute',inset:0,zIndex:0}}/>

      {/* Back button */}
      <div style={{position:'absolute',top:48,left:16,zIndex:10}}>
        <button onClick={onBack} style={{width:40,height:40,borderRadius:'50%',background:T.white,border:'none',boxShadow:T.shadowMd,
          display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          <Icon name="arrow_back" size={20} color={T.gray700}/>
        </button>
      </div>

      {/* Request count bar (only when online) */}
      {isOnline&&<div style={{position:'absolute',top:48,left:68,right:16,zIndex:10}}>
        <div style={{background:T.white,borderRadius:T.radius,padding:'10px 14px',boxShadow:T.shadow,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'#7C3AED',animation:'pulse 1.5s infinite'}}/>
          <span style={{fontSize:12,fontWeight:700,color:T.gray800}}>{reqCount} Active Request{reqCount!==1?'s':''}</span>
        </div>
      </div>}

      {/* Online/Offline toggle — bottom center */}
      {!activeReq&&isOnline&&<div style={{position:'absolute',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:10}}>
        <div onClick={onGoOnline} style={{display:'flex',alignItems:'center',gap:8,background:T.white,borderRadius:30,padding:'12px 24px',
          boxShadow:'0 4px 20px rgba(0,0,0,0.15)',cursor:'pointer',transition:'all .3s'}}>
          <div style={{width:12,height:12,borderRadius:'50%',background:'#00C9A7',
            boxShadow:'0 0 10px rgba(0,201,167,0.6)',animation:'pulse 1.5s infinite'}}/>
          <span style={{fontSize:13,fontWeight:700,color:'#059669'}}>Online</span>
          <span style={{fontSize:11,color:T.gray500,marginLeft:4}}>Tap to pause</span>
        </div>
      </div>}

      {/* Selected request detail card */}
      {activeReq&&(
        <div style={{position:'absolute',bottom:24,left:16,right:16,zIndex:10,
          background:T.white,borderRadius:20,padding:20,boxShadow:'0 8px 32px rgba(0,0,0,0.18)',
          animation:'reqSlideUp .35s ease'}}>
          <button onClick={function(){setSelectedReq(null)}} style={{position:'absolute',top:-12,right:-4,width:32,height:32,borderRadius:'50%',
            background:T.white,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
            boxShadow:'0 2px 8px rgba(0,0,0,0.15)',zIndex:5}}>
            <Icon name="close" size={18} color={T.gray600}/>
          </button>

          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <img src={activeReq.photo} style={{width:48,height:48,borderRadius:'50%',objectFit:'cover',
              border:'2.5px solid #fff',boxShadow:'0 4px 12px rgba(139,92,246,0.3)'}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:T.gray800}}>{activeReq.rider}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
                <div style={{display:'flex',alignItems:'center',gap:2}}>
                  <Icon name="star" size={13} color="#F59E0B"/>
                  <span style={{fontSize:12,fontWeight:600,color:T.gray500}}>{activeReq.rating}</span>
                </div>
                <span style={{fontSize:10,color:T.gray300}}>·</span>
                <span style={{fontSize:12,color:T.gray500}}>{activeReq.pax} pax</span>
                <span style={{fontSize:10,color:T.gray300}}>·</span>
                <span style={{fontSize:12,color:T.gray500}}>{activeReq.trips} trips</span>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:24,fontWeight:800,background:'linear-gradient(135deg,#7C3AED,#A78BFA)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{activeReq.fare}</div>
              <div style={{fontSize:11,color:T.gray500,fontWeight:600}}>{activeReq.distance}</div>
            </div>
          </div>

          <div style={{background:T.gray50,borderRadius:14,padding:'14px 14px',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:'#00C9A7',boxShadow:'0 0 6px rgba(0,201,167,0.4)'}}/>
              <span style={{fontSize:13,fontWeight:600,color:T.gray800}}>{activeReq.from}</span>
            </div>
            <div style={{width:2,height:16,background:'linear-gradient(to bottom,#00C9A7,#FF6B35)',marginLeft:5,borderRadius:1}}/>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:8}}>
              <div style={{width:12,height:12,borderRadius:3,background:'#FF6B35',boxShadow:'0 0 6px rgba(255,107,53,0.4)'}}/>
              <span style={{fontSize:13,fontWeight:600,color:T.gray800}}>{activeReq.to}</span>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:4,background:T.blue50,padding:'6px 12px',borderRadius:10}}>
              <Icon name="schedule" size={14} color={T.blue500}/>
              <span style={{fontSize:11,fontWeight:600,color:T.blue600}}>Pickup ~{activeReq.time}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4,background:'#FFF7ED',padding:'6px 12px',borderRadius:10}}>
              <Icon name="update" size={14} color="#F59E0B"/>
              <span style={{fontSize:11,fontWeight:600,color:'#D97706'}}>{activeReq.posted}</span>
            </div>
          </div>

          <div style={{display:'flex',gap:10}}>
            <button onClick={function(){setDeclined(function(s){var n={};for(var k in s)n[k]=s[k];n[activeReq.id]=true;return n});setSelectedReq(null)}}
              style={{flex:1,padding:'14px 0',background:'#FEF2F2',color:'#EF4444',border:'1.5px solid #FECACA',borderRadius:14,
                fontWeight:700,fontSize:13,cursor:'pointer',transition:'all .2s'}}>Decline</button>
            <button onClick={function(){setAccepted(function(s){var n={};for(var k in s)n[k]=s[k];n[activeReq.id]=true;return n});setSelectedReq(null)}}
              style={{flex:2,padding:'14px 0',background:'linear-gradient(135deg,#00C9A7,#00E6BE)',color:'#fff',border:'none',borderRadius:14,
                fontWeight:700,fontSize:14,cursor:'pointer',boxShadow:'0 4px 16px rgba(0,201,167,0.35)',
                display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <Icon name="check_circle" size={18} color="#fff"/>Accept Ride
            </button>
          </div>
        </div>
      )}

      {/* Offline overlay */}
      {!isOnline&&(
        <div style={{position:'absolute',inset:0,zIndex:5,background:'rgba(0,0,0,0.25)',display:'flex',alignItems:'center',justifyContent:'center',
          backdropFilter:'blur(2px)'}}>
          <div style={{background:T.white,borderRadius:24,padding:'32px 28px',boxShadow:'0 12px 40px rgba(0,0,0,0.2)',textAlign:'center',maxWidth:280}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:T.gray50,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
              <Icon name="location_off" size={32} color={T.gray300}/>
            </div>
            <div style={{fontSize:18,fontWeight:800,color:T.gray800,marginBottom:6}}>You're Offline</div>
            <div style={{fontSize:13,color:T.gray500,lineHeight:1.5,marginBottom:20}}>Go online to see ride requests from riders near you</div>
            <button onClick={onGoOnline} style={{width:'100%',padding:'14px 0',background:'linear-gradient(135deg,#00C9A7,#00E6BE)',color:'#fff',border:'none',
              borderRadius:14,fontWeight:700,fontSize:15,cursor:'pointer',boxShadow:'0 4px 16px rgba(0,201,167,0.35)',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <Icon name="power_settings_new" size={20} color="#fff"/>Go Online
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

const DriverDashboard=({onSection,onGoOnline,isOnline,userAddress,userLoc,requests=[],accepted={},setAccepted,declined={},setDeclined})=>{
  const [selectedReq,setSelectedReq]=useState(null);
  const [acceptingId,setAcceptingId]=useState(null);
  const [decliningId,setDecliningId]=useState(null);
  const playAcceptSound=()=>{
    try{
      const ctx=getAudioCtx();
      const playTone=(freq,start,dur,gain=0.15)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=freq;
        g.gain.setValueAtTime(gain,ctx.currentTime+start);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        o.connect(g);g.connect(ctx.destination);
        o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
      };
      playTone(587.33,0,0.2,0.4);playTone(783.99,0.12,0.2,0.4);playTone(1046.50,0.24,0.35,0.35);
    }catch(e){}
  };
  const playDeclineSound=()=>{
    try{
      const ctx=getAudioCtx();
      const t=ctx.currentTime;
      const playTone=(freq,start,dur,gain=0.5,type='square')=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=type;o.frequency.value=freq;
        g.gain.setValueAtTime(gain,t+start);
        g.gain.exponentialRampToValueAtTime(0.001,t+start+dur);
        o.connect(g);g.connect(ctx.destination);
        o.start(t+start);o.stop(t+start+dur);
      };
      playTone(440,0,0.18,0.5,'square');
      playTone(330,0.15,0.25,0.5,'square');
      playTone(440,0,0.18,0.3,'sine');
      playTone(330,0.15,0.25,0.3,'sine');
    }catch(e){}
  };
  const handleAccept=(id)=>{
    playAcceptSound();
    setAcceptingId(id);
    setTimeout(()=>{setAccepted(s=>({...s,[id]:true}));setAcceptingId(null);try{const ch=new BroadcastChannel('chambana-rides');ch.postMessage({type:'RIDE_ACCEPTED',requestId:id,driver:{name:'Aimar R.',rating:4.96,car:'Tesla Model Y',plate:'IL·CRD 4821',photo:'https://randomuser.me/api/portraits/men/36.jpg'}});ch.close();}catch(e){}},1200);
  };
  const handleDecline=(id)=>{
    playDeclineSound();
    setDecliningId(id);
    setTimeout(()=>{
      setDeclined(s=>({...s,[id]:true}));setDecliningId(null);
      try{const ch=new BroadcastChannel('chambana-rides');ch.postMessage({type:'RIDE_DECLINED',requestId:id,driver:{name:'Aimar R.'}});ch.close();}catch(e){}
    },900);
  };
  const activeRequests=requests.filter(r=>!accepted[r.id]&&!declined[r.id]);

  return(
    <div style={{height:'100%',overflowY:'auto',background:T.gray50,paddingBottom:100}}>
      {/* Driver Header */}
      <div style={{background:'linear-gradient(135deg,#0A2463,#1565C0,#1E88E5)',padding:'48px 20px 28px',borderRadius:`0 0 ${T.radiusXl}px ${T.radiusXl}px`,position:'relative',overflow:'hidden'}}>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12,color:'#fff',fontWeight:500}}>Welcome back</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <h1 style={{color:'#fff',fontSize:22,fontWeight:800}}>Driver Mode</h1>
            <div onClick={()=>onSection('levels')} style={{display:'flex',alignItems:'center',gap:3,cursor:'pointer'}}>
              <Icon name={driverLevel.icon} size={16} color={driverLevel.color}/>
              <span style={{fontSize:13,fontWeight:800,background:driverLevel.gradient,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Lv.{DRIVER_STATS.level}</span>
            </div>
          </div>
          <div onClick={()=>onSection('levels')} style={{display:'flex',alignItems:'center',gap:8,marginTop:6,cursor:'pointer'}}>
            <span style={{fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.8)'}}>{driverLevel.name}</span>
            <div style={{flex:1,maxWidth:120,height:4,borderRadius:2,background:'rgba(255,255,255,0.15)'}}>
              <div style={{width:`${DRIVER_STATS.levelProgress}%`,height:'100%',borderRadius:2,background:driverLevel.gradient}}/>
            </div>
            {driverLevel.next&&<span style={{fontSize:9,color:T.gray400}}>{DRIVER_STATS.levelProgress}% to {driverLevel.next}</span>}
          </div>
        </div>
        {userAddress&&<div style={{display:'flex',alignItems:'center',gap:5,borderRadius:8,padding:'6px 10px',marginBottom:14}}>
          <Icon name="my_location" size={13} color="#00C9A7"/>
          <span style={{fontSize:11,color:'#fff'}}>{userAddress.short}</span>
        </div>}
        {/* Today's Summary */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {[{v:`$${DRIVER_STATS.todayEarnings}`,l:'Today',icon:'payments'},{v:DRIVER_STATS.todayTrips,l:'Trips Today',icon:'directions_car'},{v:DRIVER_STATS.rating,l:'Rating',icon:'star'}].map((s,i)=>(
            <div key={i} style={{background:'rgba(255,255,255,0.15)',backdropFilter:'blur(8px)',borderRadius:12,padding:'12px 10px',textAlign:'center',border:'1px solid rgba(255,255,255,0.2)'}}>
              <Icon name={s.icon} size={16} color="rgba(255,255,255,0.8)"/>
              <div style={{fontSize:18,fontWeight:800,color:'#fff',marginTop:4}}>{s.v}</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,0.7)'}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Online/Offline Toggle — centered under header */}
      <div style={{display:'flex',justifyContent:'center',margin:'16px 16px 0'}}>
        <div onClick={onGoOnline} style={{display:'flex',alignItems:'center',gap:10,background:isOnline?T.white:T.white,
          border:`1.5px solid ${isOnline?'#00C9A7':'#EF4444'}`,borderRadius:30,padding:'12px 28px',cursor:'pointer',transition:'all .3s',
          boxShadow:isOnline?'0 2px 12px rgba(0,201,167,0.2)':'0 2px 12px rgba(239,68,68,0.15)'}}>
          <div style={{width:44,height:24,borderRadius:12,background:isOnline?'#00C9A7':'#EF4444',
            padding:2,display:'flex',alignItems:'center',justifyContent:isOnline?'flex-end':'flex-start',transition:'all .3s'}}>
            <div style={{width:20,height:20,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,0.3)',transition:'all .3s'}}/>
          </div>
          <span style={{fontSize:14,fontWeight:700,color:isOnline?'#059669':'#EF4444'}}>{isOnline?'Online':'Offline'}</span>
        </div>
      </div>

      {/* Quick Actions */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,padding:'16px 16px 0'}}>
        {[{icon:'route',label:'My Routes',action:()=>onSection('citytrips')},
          {icon:'calendar_month',label:'Schedule',action:()=>onSection('schedule')},
          {icon:'account_balance_wallet',label:'Wallet',action:()=>onSection('wallet')},
          {icon:'map',label:'Live Map',action:()=>onSection('drivermap')}
        ].map((a,i)=>(
          <div key={i} onClick={a.action} style={{background:T.white,borderRadius:12,padding:'14px 8px',textAlign:'center',
            boxShadow:T.shadow,border:`1px solid ${T.gray100}`,cursor:a.action?'pointer':'default'}}>
            <Icon name={a.icon} size={20} color={T.blue500}/>
            <div style={{fontSize:10,fontWeight:600,color:T.gray500,marginTop:4}}>{a.label}</div>
          </div>
        ))}
      </div>

      {/* Incoming Ride Requests */}
      <div style={{padding:'20px 16px 0'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontSize:15,fontWeight:700,color:T.gray800}}>Ride Requests</div>
            {activeRequests.length>0&&<div style={{background:T.blue600,borderRadius:10,padding:'2px 8px',
              display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#fff',animation:'pulse 1.5s infinite'}}/>
              <span style={{fontSize:10,fontWeight:700,color:'#fff'}}>{activeRequests.length}</span>
            </div>}
          </div>
          {activeRequests.length>3&&<button onClick={()=>onSection('book')} style={{fontSize:11,fontWeight:600,color:T.blue500,
            background:'none',border:'none',cursor:'pointer'}}>View All</button>}
        </div>

        {!isOnline?(
          <div style={{background:T.white,borderRadius:20,padding:'28px 24px',textAlign:'center',boxShadow:T.shadow,border:`1px solid ${T.gray100}`}}>
            <div style={{width:52,height:52,borderRadius:'50%',background:T.blue50,
              display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
              <Icon name="wifi_off" size={26} color={T.gray400}/>
            </div>
            <div style={{fontSize:15,fontWeight:700,color:T.gray800}}>You're Offline</div>
            <div style={{fontSize:12,color:T.gray500,marginTop:4}}>Go online to receive ride requests</div>
            <button onClick={onGoOnline} style={{marginTop:16,padding:'11px 32px',background:'#32D74B',color:'#fff',border:'none',borderRadius:12,
              fontWeight:700,fontSize:13,cursor:'pointer',boxShadow:'0 4px 16px rgba(50,215,75,0.3)'}}>
              Go Online
            </button>
          </div>
        ):activeRequests.length===0?(
          <div style={{background:T.white,borderRadius:20,padding:'28px 24px',textAlign:'center',boxShadow:T.shadow,border:`1px solid ${T.gray100}`}}>
            <div style={{width:52,height:52,borderRadius:'50%',background:T.blue50,

/* ═══ MAIN APP ═══ */
const App=()=>{
  const {loc:userLoc,loading:locLoading,nearest:nearestLoc,address:userAddress}=useUserLocation();
  const [tab,setTab]=useState('home');
  const [view,setView]=useState('home');
  const [booking,setBooking]=useState(null);
  const [driver,setDriver]=useState(null);
  const [drawer,setDrawer]=useState(false);
  const [drawerShow,setDrawerShow]=useState(false);
  const [initFrom,setInitFrom]=useState('');
  const [initTo,setInitTo]=useState('');
  const [extraServices,setExtraServices]=useState([]);
  const [darkMode,setDarkMode]=useState(false);
  const [isDriverMode,setIsDriverMode]=useState(()=>localStorage.getItem('chambana-driver')==='true');
  const [isDriverOnline,setIsDriverOnline]=useState(false);
  const {queue:driverRequests,notification:incomingNotif,dismissNotification}=useIncomingRequests(isDriverOnline);
  const [sharedAccepted,setSharedAccepted]=useState({});
  const [sharedDeclined,setSharedDeclined]=useState({});

  useEffect(()=>{
    T=LIGHT;
    document.body.classList.remove('dark-mode');
    localStorage.removeItem('chambana-dark');
  },[darkMode]);
  const toggleDark=()=>setDarkMode(d=>!d);
  const toggleDriverMode=()=>{
    setIsDriverMode(d=>{
      const next=!d;
      localStorage.setItem('chambana-driver',next);
      if(next){setIsDriverOnline(false);}
      return next;
    });
    setView('home');setTab('home');
  };
  const playGoOnlineSound=()=>{
    try{
      const ctx=getAudioCtx();
      const playTone=(freq,start,dur,gain=0.3)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=freq;
        g.gain.setValueAtTime(gain,ctx.currentTime+start);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        o.connect(g);g.connect(ctx.destination);
        o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
      };
      playTone(440,0,0.12,0.3);playTone(554.37,0.1,0.12,0.3);playTone(659.25,0.2,0.15,0.35);playTone(880,0.32,0.25,0.3);
    }catch(e){}
  };
  const playGoOfflineSound=()=>{
    try{
      const ctx=getAudioCtx();
      const playTone=(freq,start,dur,gain=0.25)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=freq;
        g.gain.setValueAtTime(gain,ctx.currentTime+start);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        o.connect(g);g.connect(ctx.destination);
        o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
      };
      playTone(659.25,0,0.15,0.25);playTone(440,0.12,0.2,0.2);
    }catch(e){}
  };
  const toggleDriverOnline=()=>setIsDriverOnline(d=>{
    if(d){playGoOfflineSound();}else{playGoOnlineSound();}
    return !d;
  });

  const openDr=()=>{setDrawerShow(true);requestAnimationFrame(()=>requestAnimationFrame(()=>setDrawer(true)))};
  const closeDr=()=>{setDrawer(false);setTimeout(()=>setDrawerShow(false),300)};

  /* Navigation history stack */
  const historyRef=useRef(['home']);
  const navigate=(v)=>{
    if(v!==view){historyRef.current.push(view)}
    setView(v);
  };
  const goBack=()=>{
    const stack=historyRef.current;
    if(stack.length>0){
      const prev=stack.pop();
      setView(prev);
      if(['home','book','community','history'].includes(prev))setTab(prev);
    }else{setView('home');setTab('home')}
  };
  const goHome=()=>{historyRef.current=['home'];setView('home');setTab('home')};
  const goBook=(from,to,services)=>{setInitFrom(from||'');setInitTo(to||'');setExtraServices(services||[]);navigate('book');setTab('book')};
  const goMap=()=>navigate('map');

  const handleTab=(t)=>{
    setTab(t);
    historyRef.current=['home'];
    if(t==='home')setView('home');
    else if(t==='book')setView('book');
    else if(t==='community')setView('community');
    else if(t==='history')setView('history');
  };

  /* Main content */
  const renderContent=()=>{
    switch(view){
      case 'map': return <FullMapView onBack={goBack} userLoc={userLoc} userAddress={userAddress}/>;
      case 'drivermap': return <DriverMapView onBack={goBack} userLoc={userLoc} userAddress={userAddress} onGoOnline={toggleDriverOnline} isOnline={isDriverOnline} requests={driverRequests}/>;
      case 'book': return isDriverMode?
        <DriverRequestsPage onGoOnline={toggleDriverOnline} isOnline={isDriverOnline} requests={driverRequests} accepted={sharedAccepted} setAccepted={setSharedAccepted} declined={sharedDeclined} setDeclined={setSharedDeclined}/>:
        <BookingPage initFrom={initFrom} initTo={initTo} extraServices={extraServices} nearestLoc={nearestLoc} userLoc={userLoc} userAddress={userAddress} onBack={goBack} onPick={(b)=>{setBooking(b);navigate('pick')}}/>;
      case 'pick': return <DriverPick booking={booking} userLoc={userLoc} userAddress={userAddress} onSelect={(d)=>{setDriver(d);navigate('trip')}} onBack={goBack}/>;
      case 'trip': return <TripTrack driver={driver} booking={booking} userLoc={userLoc} userAddress={userAddress} onDone={goHome}/>;
      case 'airport': return <AirportPage onBack={goBack} onBook={goBook} onFlights={()=>navigate('flights')} nearestLoc={nearestLoc} userAddress={userAddress}/>;
      case 'citytrips': return <CityTripsPage onBack={goBack} onBook={goBook}/>;
      case 'shared': return <SharedPage onBack={goBack} isDriver={isDriverMode}/>;
      case 'schedule': return <SchedulePage onBack={goBack} isDriverMode={isDriverMode}/>;
      case 'community': return <CommunityPage isDriverMode={isDriverMode}/>;
      case 'history': return isDriverMode?<DriverEarningsPage/>:<HistoryPage/>;
      case 'wallet': return <WalletPage onBack={goBack} isDriverMode={isDriverMode}/>;
      case 'settings': return <SettingsPage onBack={goBack} darkMode={darkMode} toggleDark={toggleDark} isDriverMode={isDriverMode} toggleDriverMode={toggleDriverMode}/>;
      case 'flights': return <FlightTracker onBack={goBack} onBook={goBook}/>;
      case 'food': return <FoodDeliveryPage onBack={goBack}/>;
      case 'vip': return <BlackVIPPage onBack={goBack} onBookVip={goBook} userLoc={userLoc} userAddress={userAddress}/>;
      case 'help': return <HelpPage onBack={goBack}/>;
      case 'levels': return <DriverLevelsPage onBack={goBack} currentLevel={DRIVER_STATS.level} progress={DRIVER_STATS.levelProgress}/>;
      default: return isDriverMode?
        <DriverDashboard onSection={navigate} onGoOnline={toggleDriverOnline} isOnline={isDriverOnline} userAddress={userAddress} userLoc={userLoc} requests={driverRequests} accepted={sharedAccepted} setAccepted={setSharedAccepted} declined={sharedDeclined} setDeclined={setSharedDeclined}/>:
        <HomePage onBook={goBook} onViewMap={goMap} onSection={(s)=>navigate(s)} userLoc={userLoc} userAddress={userAddress} nearestLoc={nearestLoc}/>;
    }
  };

  const navItems=isDriverMode?[
    {id:'home',icon:'dashboard',label:'Dashboard'},
    {id:'book',icon:'notifications',label:'Requests'},
    {id:'community',icon:'groups',label:'Community'},
    {id:'history',icon:'payments',label:'Earnings'},
  ]:[
    {id:'home',icon:'home',label:'Home'},
    {id:'book',icon:'search',label:'Book'},
    {id:'community',icon:'groups',label:'Community'},
    {id:'history',icon:'receipt_long',label:'History'},
  ];

  // Accept/Decline from notification card
  const notifAccept=(id)=>{
    try{const ctx=getAudioCtx();const t=ctx.currentTime;const pt=(f,s,d,g=0.4)=>{const o=ctx.createOscillator(),gn=ctx.createGain();o.type='sine';o.frequency.value=f;gn.gain.setValueAtTime(g,t+s);gn.gain.exponentialRampToValueAtTime(0.001,t+s+d);o.connect(gn);gn.connect(ctx.destination);o.start(t+s);o.stop(t+s+d)};pt(587.33,0,0.2);pt(783.99,0.12,0.2);pt(1046.50,0.24,0.35)}catch(e){}
    setSharedAccepted(s=>({...s,[id]:true}));
    try{const ch=new BroadcastChannel('chambana-rides');ch.postMessage({type:'RIDE_ACCEPTED',requestId:id,driver:{name:'Aimar R.',rating:4.96,car:'Tesla Model Y',plate:'IL·CRD 4821',photo:'https://randomuser.me/api/portraits/men/36.jpg'}});ch.close();}catch(e){}
    dismissNotification();
  };
  const notifDecline=(id)=>{
    try{const ctx=getAudioCtx();const t=ctx.currentTime;const pt=(f,s,d,g=0.5,tp='square')=>{const o=ctx.createOscillator(),gn=ctx.createGain();o.type=tp;o.frequency.value=f;gn.gain.setValueAtTime(g,t+s);gn.gain.exponentialRampToValueAtTime(0.001,t+s+d);o.connect(gn);gn.connect(ctx.destination);o.start(t+s);o.stop(t+s+d)};pt(440,0,0.18,0.5,'square');pt(330,0.15,0.25,0.5,'square');pt(440,0,0.18,0.3,'sine');pt(330,0.15,0.25,0.3,'sine')}catch(e){}
    setSharedDeclined(s=>({...s,[id]:true}));
    try{const ch=new BroadcastChannel('chambana-rides');ch.postMessage({type:'RIDE_DECLINED',requestId:id,driver:{name:'Aimar R.'}});ch.close();}catch(e){}
    dismissNotification();
  };

  return React.createElement(React.Fragment,{key:darkMode?'dark':'light'},
    /* Main Container */

        React.createElement('button',{onClick:openDr,style:{width:40,height:40,borderRadius:'50%',background:'rgba(255,255,255,0.2)',

          position:'relative',overflow:'hidden',border:'1px solid rgba(0,82,212,0.1)'}},
          /* Close */
