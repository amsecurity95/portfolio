const AddressInput=({placeholder,icon,iconColor,value,onChange})=>{
  const [suggestions,setSuggestions]=useState([]);
  const [focused,setFocused]=useState(false);
  const debounceRef=useRef(null);
  const fetchSuggestions=(q)=>{
    if(debounceRef.current)clearTimeout(debounceRef.current);
    if(!q||q.length<3){setSuggestions([]);return;}
    debounceRef.current=setTimeout(async()=>{
      try{
        const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&countrycodes=us&addressdetails=1`,
          {headers:{'Accept-Language':'en'}});
        const data=await res.json();
        setSuggestions(data.map(d=>({display:d.display_name,short:
          [d.address?.house_number,d.address?.road,d.address?.city||d.address?.town||d.address?.village,d.address?.state].filter(Boolean).join(', ')||d.display_name.split(',').slice(0,3).join(',')
        })));
      }catch(e){setSuggestions([]);}
    },350);
  };
  return(
    <div style={{position:'relative',marginTop:4}}>
      <Icon name={icon} size={14} color={iconColor} style={{position:'absolute',left:12,top:13,zIndex:1}}/>
      <input value={value} onChange={e=>{onChange(e.target.value);fetchSuggestions(e.target.value);}}
        onFocus={()=>setFocused(true)} onBlur={()=>setTimeout(()=>setFocused(false),200)}
        placeholder={placeholder}
        style={{width:'100%',padding:'10px 12px 10px 34px',borderRadius:8,border:`1.5px solid ${focused&&suggestions.length?T.blue400:T.gray200}`,
          fontSize:13,outline:'none',background:T.gray50,fontFamily:'inherit',transition:'border-color .2s'}}/>
      {focused&&suggestions.length>0&&(
        <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:99,marginTop:4,background:T.white,borderRadius:10,
          boxShadow:'0 8px 30px rgba(0,0,0,0.15)',border:`1px solid ${T.gray100}`,overflow:'hidden',maxHeight:220,overflowY:'auto'}}>
          {suggestions.map((s,i)=>(
            <div key={i} onMouseDown={()=>{onChange(s.short);setSuggestions([]);}}
              style={{padding:'10px 14px',cursor:'pointer',borderBottom:i<suggestions.length-1?`1px solid ${T.gray50}`:'none',
                display:'flex',alignItems:'flex-start',gap:8,transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background=T.blue50}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
              <Icon name="location_on" size={16} color={T.blue500} style={{flexShrink:0,marginTop:1}}/>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:T.gray800}}>{s.short}</div>
                <div style={{fontSize:10,color:T.gray500,marginTop:1,lineHeight:1.3}}>{s.display.length>80?s.display.slice(0,80)+'…':s.display}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

    const id=chatUser.id;
    setChatMsgs(s=>({...s,[id]:[...(s[id]||[]),{from:'me',text:chatInput.trim(),t:'Just now'}]}));
    setChatInput('');
    setTimeout(()=>{
      setChatMsgs(s=>({...s,[id]:[...(s[id]||[]),{from:'them',text:'Thanks for reaching out! Let me check the details and get back to you.',t:'Just now'}]}));
    },2000);
  };

  /* Driver's accepted rides data */
  const DRIVER_ACCEPTED_RIDES=[
    {id:'da1',rider:'Emily K.',avatar:'EK',from:'Champaign',to:'O\'Hare Airport',date:'Mar 8, 2026',time:'6:00 AM',pax:2,fare:'$85',status:'upcoming'},
    {id:'da2',rider:'James L.',avatar:'JL',from:'Urbana',to:'Midway Airport',date:'Mar 9, 2026',time:'2:30 PM',pax:1,fare:'$72',status:'upcoming'},
    {id:'da3',rider:'Sarah M.',avatar:'SM',from:'Campus Town',to:'Chicago Downtown',date:'Mar 10, 2026',time:'8:00 AM',pax:3,fare:'$95',status:'upcoming'},
  ];

  return(
    <div style={{height:'100%',overflowY:'auto',background:T.gray50,paddingBottom:100}}>
      <div style={{background:isDriverMode?'linear-gradient(135deg,#0A2463,#1565C0,#1E88E5)':T.gradHero,padding:'48px 20px 24px',borderRadius:`0 0 ${T.radiusXl}px ${T.radiusXl}px`,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,borderRadius:'50%',background:'rgba(255,255,255,0.05)'}}/>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:20,padding:'6px 14px',
          display:'flex',alignItems:'center',gap:4,cursor:'pointer',color:'#fff',fontSize:12,fontWeight:600,marginBottom:16}}>
          <Icon name="arrow_back" size={16} color="#fff"/>Back
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <Icon name={isDriverMode?'calendar_month':'calendar_month'} size={28} color="#fff"/>
          <h1 style={{color:'#fff',fontSize:22,fontWeight:800}}>{isDriverMode?'My Schedule':'Schedule a Trip'}</h1>
        </div>
        <p style={{color:'#fff',fontSize:13}}>{isDriverMode?'Manage rides, bid on trips & set availability':'Plan ahead — post trips, get bids from drivers'}</p>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,margin:'16px 16px 0',background:T.gray100,borderRadius:10,padding:3}}>
        {(isDriverMode?[{id:'available',label:'Available Rides'},{id:'accepted',label:'My Rides'},{id:'availability',label:'Availability'}]
          :[{id:'browse',label:'Browse Trips'},{id:'create',label:'Schedule New'}]).map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',fontSize:isDriverMode?10:12,fontWeight:600,cursor:'pointer',transition:'all .2s',
              background:tab===t.id?T.white:'transparent',color:tab===t.id?T.blue600:T.gray500,
              boxShadow:tab===t.id?'0 1px 4px rgba(0,0,0,0.08)':'none'}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:'16px 16px'}}>

        {/* ═══ DRIVER: Available Rides to Bid On ═══ */}
        {tab==='available'&&<>
          <div style={{background:'linear-gradient(135deg,#E3F2FD,#BBDEFB)',borderRadius:12,padding:14,marginBottom:14,border:'1px solid #90CAF9'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <Icon name="info" size={16} color="#1565C0"/>
              <span style={{fontSize:12,fontWeight:600,color:'#0D47A1'}}>Browse rider-posted trips and place your bids to get hired.</span>
            </div>
          </div>
          {SCHEDULED_TRIPS.map(t=>(
            <div key={t.id} style={{background:T.white,borderRadius:T.radiusLg,padding:16,marginBottom:12,boxShadow:T.shadow,
              border:`1px solid ${T.gray100}`}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <Avatar initials={t.avatar} size={38}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.gray800}}>{t.user}</div>
                  <div style={{fontSize:10,color:T.gray500}}>{t.type==='round'?'Round Trip':'One Way'} · {t.pax} pax</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:18,fontWeight:800,color:T.accent}}>{t.budget}</div>
                  <div style={{fontSize:9,color:T.gray500}}>Budget</div>
                </div>
              </div>

              {/* Route */}
              <div style={{background:T.gray50,borderRadius:10,padding:12,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:T.accent}}/>
                  <span style={{fontSize:12,fontWeight:600,color:T.gray800}}>{t.from}</span>
                  <Icon name="arrow_forward" size={12} color={T.gray300}/>
                  <div style={{width:8,height:8,borderRadius:2,background:T.orange}}/>
                  <span style={{fontSize:12,fontWeight:600,color:T.gray800}}>{t.to}</span>
                </div>
                <div style={{display:'flex',gap:12,fontSize:11,color:T.gray500}}>
                  <span><Icon name="schedule" size={12} color={T.gray400}/> {t.departDate} {t.departTime}</span>
                  {t.type==='round'&&<span><Icon name="event" size={12} color={T.gray400}/> Return: {t.returnDate}</span>}
                </div>
              </div>

              {/* Competition info */}
              <div style={{display:'flex',gap:16,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="gavel" size={14} color={T.gray400}/>
                  <span style={{fontSize:11,color:T.gray500}}>{t.bids} bids</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="people" size={14} color={T.gray400}/>
                  <span style={{fontSize:11,color:T.gray500}}>{t.interested} interested</span>
                </div>
              </div>

              {driverBids[t.id]?
                <button style={{width:'100%',padding:'10px 0',background:T.accent,color:'#fff',border:'none',borderRadius:8,
                  fontWeight:700,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                  <Icon name="check_circle" size={14} color="#fff"/>Bid Placed — ${driverBids[t.id]}
                </button>
              :<div style={{display:'flex',gap:8}}>
                <div style={{flex:1,display:'flex',alignItems:'center',gap:0,background:T.gray50,borderRadius:8,border:`1.5px solid ${T.gray200}`,overflow:'hidden'}}>
                  <span style={{padding:'0 10px',fontSize:14,fontWeight:700,color:T.gray500}}>$</span>
                  <input value={bidAmount[t.id]||''} onChange={e=>setBidAmount(s=>({...s,[t.id]:e.target.value.replace(/[^0-9]/g,'')}))}
                    placeholder={t.budget.replace('$','')}
                    style={{flex:1,padding:'10px 8px 10px 0',border:'none',outline:'none',fontSize:13,fontWeight:600,background:'transparent'}}/>
                </div>
                <button onClick={()=>{if(bidAmount[t.id]){setDriverBids(s=>({...s,[t.id]:bidAmount[t.id]}))}}}
                  style={{padding:'10px 18px',background:bidAmount[t.id]?T.grad:T.gray200,color:bidAmount[t.id]?'#fff':T.gray400,border:'none',borderRadius:8,
                    fontWeight:700,fontSize:12,cursor:bidAmount[t.id]?'pointer':'default',whiteSpace:'nowrap'}}>
                  Place Bid
                </button>
                <button onClick={()=>openTripChat(t)} style={{padding:'10px 12px',background:T.gray50,border:`1px solid ${T.gray200}`,borderRadius:8,cursor:'pointer',flexShrink:0}}>
                  <Icon name="chat" size={14} color={T.gray500}/>
                </button>
              </div>}
            </div>
          ))}
        </>}

        {/* ═══ DRIVER: My Accepted Rides ═══ */}
        {tab==='accepted'&&<>
          {DRIVER_ACCEPTED_RIDES.length===0?
            <div style={{background:T.white,borderRadius:14,padding:'40px 20px',textAlign:'center',boxShadow:T.shadow}}>
              <Icon name="event_busy" size={44} color={T.gray300}/>
              <div style={{fontSize:14,fontWeight:600,color:T.gray500,marginTop:10}}>No upcoming rides</div>
              <div style={{fontSize:12,color:T.gray500,marginTop:4}}>Bid on available rides to fill your schedule</div>
            </div>
          :
          <>
            <div style={{background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',borderRadius:12,padding:14,marginBottom:14,border:'1px solid #A5D6A7',
              display:'flex',alignItems:'center',gap:10}}>
              <Icon name="event_available" size={20} color="#2E7D32"/>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'#1B5E20'}}>{DRIVER_ACCEPTED_RIDES.length} Upcoming Rides</div>
                <div style={{fontSize:11,color:'#2E7D32'}}>Estimated earnings: ${DRIVER_ACCEPTED_RIDES.reduce((s,r)=>s+parseInt(r.fare.replace('$','')),0)}</div>
              </div>
            </div>
            {DRIVER_ACCEPTED_RIDES.map((r,i)=>(
              <div key={r.id} style={{background:T.white,borderRadius:14,padding:16,marginBottom:10,boxShadow:T.shadow,border:`1px solid ${T.gray100}`,
                animation:`fadeUp .3s ease ${i*50}ms both`}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <Avatar initials={r.avatar} size={38}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:T.gray800}}>{r.rider}</div>
                    <div style={{fontSize:10,color:T.gray500}}>{r.pax} passenger{r.pax>1?'s':''}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:18,fontWeight:800,color:T.accent}}>{r.fare}</div>
                    <span style={{fontSize:9,fontWeight:600,color:'#1565C0',background:'#E3F2FD',padding:'2px 8px',borderRadius:4}}>
                      {r.status==='upcoming'?'UPCOMING':'IN PROGRESS'}
                    </span>
                  </div>
                </div>
                <div style={{background:T.gray50,borderRadius:10,padding:12,marginBottom:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:T.accent}}/>
                    <span style={{fontSize:12,fontWeight:600,color:T.gray800}}>{r.from}</span>
                    <Icon name="arrow_forward" size={12} color={T.gray300}/>
                    <div style={{width:8,height:8,borderRadius:2,background:T.orange}}/>
                    <span style={{fontSize:12,fontWeight:600,color:T.gray800}}>{r.to}</span>
                  </div>
                  <div style={{display:'flex',gap:12,fontSize:11,color:T.gray500}}>
                    <span><Icon name="calendar_today" size={12} color={T.gray400}/> {r.date}</span>
                    <span><Icon name="schedule" size={12} color={T.gray400}/> {r.time}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button style={{flex:1,padding:'10px 0',background:T.grad,color:'#fff',border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer',
                    display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                    <Icon name="navigation" size={14} color="#fff"/>Navigate
                  </button>
                  <button style={{flex:1,padding:'10px 0',background:T.gray50,color:T.gray500,border:`1px solid ${T.gray200}`,borderRadius:8,
                    fontWeight:600,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                    <Icon name="chat" size={14} color={T.gray500}/>Message Rider
                  </button>
                </div>
              </div>
            ))}
          </>}
        </>}

        {/* ═══ DRIVER: Availability Settings ═══ */}
        {tab==='availability'&&<DriverAvailabilityTab/>}

        {/* ═══ RIDER: Browse Scheduled Trips (original) ═══ */}
        {tab==='browse'&&<>
          {SCHEDULED_TRIPS.map(t=>(
            <div key={t.id} style={{background:T.white,borderRadius:T.radiusLg,padding:16,marginBottom:12,boxShadow:T.shadow,
              border:`1px solid ${t.visibility==='public'?T.blue100:T.gray100}`}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <Avatar initials={t.avatar} size={38}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.gray800}}>{t.user}</div>
                  <div style={{fontSize:10,color:T.gray500}}>{t.type==='round'?'Round Trip':'One Way'}</div>
                </div>
                <span style={{fontSize:9,fontWeight:700,padding:'3px 8px',borderRadius:6,
                  background:t.visibility==='public'?T.accentLight:T.gray100,
                  color:t.visibility==='public'?T.accent:T.gray500}}>
                  {t.visibility==='public'?'PUBLIC':'DRIVERS ONLY'}
                </span>
              </div>

              {/* Route */}
              <div style={{background:T.gray50,borderRadius:10,padding:12,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:T.accent}}/>
                  <span style={{fontSize:12,fontWeight:600,color:T.gray800}}>{t.from}</span>
                  <Icon name="arrow_forward" size={12} color={T.gray300}/>
                  <div style={{width:8,height:8,borderRadius:2,background:T.orange}}/>
                  <span style={{fontSize:12,fontWeight:600,color:T.gray800}}>{t.to}</span>
                </div>
                <div style={{display:'flex',gap:12,fontSize:11,color:T.gray500}}>
                  <span><Icon name="flight_takeoff" size={12} color={T.gray400}/> {t.departDate} {t.departTime}</span>
                  {t.type==='round'&&<span><Icon name="flight_land" size={12} color={T.gray400}/> {t.returnDate} {t.returnTime}</span>}
                </div>
              </div>

              {/* Budget & Stats */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div>
                  <div style={{fontSize:20,fontWeight:800,color:T.blue600}}>{t.budget}</div>
                  <div style={{fontSize:10,color:T.gray500}}>{t.pax} passenger{t.pax>1?'s':''}</div>
                </div>
                <div style={{display:'flex',gap:12}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:16,fontWeight:800,color:T.gray800}}>{t.bids}</div>
                    <div style={{fontSize:9,color:T.gray500}}>Bids</div>
                  </div>
                  {t.visibility==='public'&&<div style={{textAlign:'center'}}>
                    <div style={{fontSize:16,fontWeight:800,color:T.gray800}}>{t.interested+(extraInterested[t.id]||0)}</div>
                    <div style={{fontSize:9,color:T.gray500}}>Interested</div>
                  </div>}
                </div>
              </div>

              <div style={{display:'flex',gap:8}}>
                {(t.visibility==='public'?joinedTrip[t.id]:bidded[t.id])?
                  <button style={{flex:1,padding:'10px 0',background:T.accent,color:'#fff',border:'none',borderRadius:8,
                    fontWeight:700,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                    <Icon name="check_circle" size={14} color="#fff"/>
                    {t.visibility==='public'?'Request Sent!':'Bid Submitted!'}
                  </button>
                :
                  <button onClick={()=>{
                    if(t.visibility==='public'){setJoinedTrip(s=>({...s,[t.id]:true}));setExtraInterested(s=>({...s,[t.id]:(s[t.id]||0)+1}));}
                    else{setBidded(s=>({...s,[t.id]:true}));}
                  }}
                    style={{flex:1,padding:'10px 0',background:T.grad,color:'#fff',border:'none',borderRadius:8,
                      fontWeight:700,fontSize:12,cursor:'pointer'}}>
                    {t.visibility==='public'?'Request to Join':'Bid as Driver'}
                  </button>
                }
                <button onClick={()=>openTripChat(t)} style={{padding:'10px 16px',background:T.gray50,color:T.gray600,border:`1px solid ${T.gray200}`,borderRadius:8,
                  fontWeight:600,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="chat" size={14} color={T.gray500}/>Message
                </button>
              </div>
            </div>
          ))}
        </>}

        {/* ═══ RIDER: Create Scheduled Trip (original) ═══ */}
        {tab==='create'&&<>
          <div style={{background:T.white,borderRadius:T.radiusLg,padding:20,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,color:T.gray800,marginBottom:4}}>Schedule a New Trip</div>
            <div style={{fontSize:11,color:T.gray500,marginBottom:16}}>Post your trip — drivers bid, or riders request to join</div>

            {/* Trip Type Toggle */}
            <div style={{display:'flex',gap:0,background:T.blue50,borderRadius:8,padding:3,marginBottom:14}}>
              {['round','one-way'].map(tt=>(
                <button key={tt} onClick={()=>setTripType(tt)}
                  style={{flex:1,padding:'8px 0',borderRadius:6,border:'none',fontSize:11,fontWeight:600,cursor:'pointer',
                    background:tripType===tt?T.white:'transparent',color:tripType===tt?T.blue600:T.gray500,
                    boxShadow:tripType===tt?'0 1px 4px rgba(0,0,0,0.08)':'none'}}>
                  {tt==='round'?'Round Trip':'One Way'}
                </button>
              ))}
            </div>

            <div style={{marginBottom:12}}>
              <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Pickup Address</label>
              <AddressInput placeholder="Enter pickup address or location" icon="trip_origin" iconColor={T.accent} value={schedFrom} onChange={setSchedFrom}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Drop-off Address</label>
              <AddressInput placeholder="Enter drop-off address or location" icon="location_on" iconColor={T.orange} value={schedTo} onChange={setSchedTo}/>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Depart Date</label>
                <input type="date" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${T.gray200}`,fontSize:13,marginTop:4,outline:'none',background:T.gray50}}/>
              </div>
              <div>
                <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Depart Time</label>
                <input type="time" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${T.gray200}`,fontSize:13,marginTop:4,outline:'none',background:T.gray50}}/>
              </div>
            </div>

            {tripType==='round'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Return Date</label>
                <input type="date" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${T.gray200}`,fontSize:13,marginTop:4,outline:'none',background:T.gray50}}/>
              </div>
              <div>
                <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Return Time</label>
                <input type="time" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${T.gray200}`,fontSize:13,marginTop:4,outline:'none',background:T.gray50}}/>
              </div>
            </div>}

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
              <div>
                <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Budget</label>
                <input placeholder="$200" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${T.gray200}`,fontSize:13,marginTop:4,outline:'none',background:T.gray50}}/>
              </div>
              <div>
                <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5}}>Passengers</label>
                <input type="number" min="1" max="8" defaultValue="1" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${T.gray200}`,fontSize:13,marginTop:4,outline:'none',background:T.gray50}}/>
              </div>
            </div>

            {/* Visibility Toggle */}
            <div style={{marginBottom:16}}>
              <label style={{fontSize:10,fontWeight:600,color:T.gray500,textTransform:'uppercase',letterSpacing:0.5,marginBottom:8,display:'block'}}>Visibility</label>
              <div style={{display:'flex',gap:10}}>
                <div onClick={()=>setVisibility('public')}
                  style={{flex:1,padding:12,borderRadius:10,cursor:'pointer',textAlign:'center',
                    border:`2px solid ${visibility==='public'?T.blue500:T.gray200}`,
                    background:visibility==='public'?T.blue50:T.white}}>
                  <Icon name="public" size={20} color={visibility==='public'?T.blue600:T.gray400}/>
                  <div style={{fontSize:12,fontWeight:700,color:visibility==='public'?T.blue600:T.gray600,marginTop:4}}>Public</div>
                  <div style={{fontSize:9,color:T.gray400}}>Riders can request to join</div>
                </div>
                <div onClick={()=>setVisibility('private')}
                  style={{flex:1,padding:12,borderRadius:10,cursor:'pointer',textAlign:'center',
                    border:`2px solid ${visibility==='private'?T.blue500:T.gray200}`,
                    background:visibility==='private'?T.blue50:T.white}}>
                  <Icon name="lock" size={20} color={visibility==='private'?T.blue600:T.gray400}/>
                  <div style={{fontSize:12,fontWeight:700,color:visibility==='private'?T.blue600:T.gray600,marginTop:4}}>Private</div>
                  <div style={{fontSize:9,color:T.gray400}}>Only drivers see & bid</div>
                </div>
              </div>
            </div>

            {tripPosted?
              <button style={{width:'100%',padding:'13px 0',background:T.accent,color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:14,
                display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <Icon name="check_circle" size={18} color="#fff"/>Trip Posted!
              </button>
            :
              <button onClick={()=>{setTripPosted(true);setShowPostConfirm(true);setPostConfirmClosing(false);}} style={{width:'100%',padding:'13px 0',background:T.grad,color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',boxShadow:T.shadowBlue}}>
                Post Trip
              </button>
            }
          </div>
        </>}
      </div>

      {/* Trip Posted Confirmation Popup */}
      {showPostConfirm&&(
        <div style={{position:'fixed',inset:0,zIndex:10002,display:'flex',alignItems:'center',justifyContent:'center',
          animation:'overlayIn .3s ease'}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(6px)'}}/>
          <div style={{position:'relative',width:300,background:T.white,borderRadius:24,padding:'36px 28px 28px',textAlign:'center',
            boxShadow:'0 24px 64px rgba(0,0,0,0.25)',
            animation:postConfirmClosing?'popOutCenter .3s ease forwards':'popInCenter .5s cubic-bezier(0.34,1.56,0.64,1) forwards'}}>

/* ═══ FULL MAP VIEW ═══ */
const FullMapView=({onBack,userLoc,userAddress})=>{
  const [selectedDriver,setSelectedDriver]=useState(null);
  const [filterType,setFilterType]=useState('all');
  const [tripSim,setTripSim]=useState('idle'); // idle, loading, running, paused, done
  const [tripProgress,setTripProgress]=useState(0);
  const [tripInfo,setTripInfo]=useState(null);
  const tripRouteRef=useRef(null);
  const tripPolyRef=useRef(null);
  const tripCarMarkerRef=useRef(null);
  const tripAnimIdRef=useRef(null);
  const tripIdxRef=useRef(0);
  const tripSpeedRef=useRef(80); // ms per step
  const tripSpeedLevel=useRef(1); // 1x, 2x, 3x

  const JAMES=DRV.find(d=>d.id===5);
  const JAMES_POS=DRIVER_POSITIONS[4];

  const startTripSim=async()=>{
    setTripSim('loading');
    const from={lat:JAMES_POS.lat,lng:JAMES_POS.lng};
    const to=LOCS.find(l=>l.id==='ohare');
    const route=await fetchOSRMRoute(from,to);
    if(!route||route.coords.length<2){setTripSim('idle');return;}
    tripRouteRef.current=route;
    // Calculate ms per coordinate from OSRM route duration
    // Compression 10x = 2.5hr trip plays in ~15min at 1x
    const realMsPerCoord=(route.duration*1000)/route.coords.length;
    const simCompression=10;
    tripSpeedRef.current=Math.max(50,Math.min(500,realMsPerCoord/simCompression));
    setTripInfo({distance:(route.distance/1609.34).toFixed(1),duration:Math.round(route.duration/60),coords:route.coords.length});
    setTripSim('running');
    tripIdxRef.current=0;
    setTripProgress(0);
    runTripAnim();
  };

  const runTripAnim=()=>{
    const step=()=>{
      const route=tripRouteRef.current;
      if(!route)return;
      const idx=tripIdxRef.current;
      if(idx>=route.coords.length){setTripSim('done');setTripProgress(100);return;}
      setTripProgress(Math.round((idx/route.coords.length)*100));
      // Real-time: total route duration / number of coords = ms per coord
      // Then divide by speed multiplier for fast-forward
      const msPerCoord=tripSpeedRef.current;
      tripIdxRef.current=idx+1;
      tripAnimIdRef.current=setTimeout(step,msPerCoord/tripSpeedLevel.current);
    };
    step();
  };

  const pauseTripSim=()=>{
    clearTimeout(tripAnimIdRef.current);
    setTripSim('paused');
  };

  const resumeTripSim=()=>{
    setTripSim('running');
    runTripAnim();
  };

  const resetTripSim=()=>{
    clearTimeout(tripAnimIdRef.current);
    setTripSim('idle');setTripProgress(0);tripIdxRef.current=0;tripRouteRef.current=null;setTripInfo(null);
  };

  useEffect(()=>()=>clearTimeout(tripAnimIdRef.current),[]);

  const filteredDrivers=filterType==='all'?DRV:DRV.filter(d=>d.carType===filterType);

  const onDriverClick=(d)=>{
    setSelectedDriver(selectedDriver&&selectedDriver.id===d.id?null:d);
  };

  return(
  <div style={{height:'100%',position:'relative'}}>
    <MapView userLoc={userLoc} userAddress={userAddress} selectedDriver={selectedDriver} filterType={filterType}
      tripSimRoute={tripRouteRef.current} tripSimProgress={tripProgress} tripSimActive={tripSim==='running'||tripSim==='paused'||tripSim==='done'}
      tripSimDriverIdx={4}/>
    <div style={{position:'absolute',top:48,left:16,zIndex:10}}>
      <button onClick={onBack} style={{width:40,height:40,borderRadius:'50%',background:T.white,border:'none',boxShadow:T.shadowMd,
        display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
        <Icon name="arrow_back" size={20} color={T.gray700}/>
      </button>
    </div>
    {/* Location info bar */}
    {userAddress&&<div style={{position:'absolute',top:48,left:68,right:16,zIndex:10}}>
      <div style={{background:T.white,borderRadius:T.radius,padding:'10px 14px',boxShadow:T.shadow,display:'flex',alignItems:'center',gap:8}}>
        <Icon name="my_location" size={18} color={T.blue500}/>
        <div style={{flex:1,overflow:'hidden'}}>
          <div style={{fontSize:12,fontWeight:600,color:T.gray800,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{userAddress.short}</div>
        </div>
      </div>
    </div>}
    {/* Trip Simulation Control */}
    <div style={{position:'absolute',top:100,right:16,zIndex:10}}>
      {tripSim==='idle'?(
        <button onClick={startTripSim}
          style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',background:'linear-gradient(135deg,#00C9A7,#00E6BE)',
            borderRadius:12,border:'none',cursor:'pointer',boxShadow:'0 4px 16px rgba(0,201,167,0.35)'}}>
          <Icon name="play_arrow" size={20} color="#fff"/>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#fff'}}>Test: James → O'Hare</div>
            <div style={{fontSize:9,color:T.gray600}}>Simulate trip on map</div>
          </div>
        </button>
      ):tripSim==='loading'?(
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',background:T.white,borderRadius:12,boxShadow:T.shadow}}>
          <div style={{width:18,height:18,border:'2px solid #00C9A7',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
          <span style={{fontSize:11,fontWeight:600,color:T.gray500}}>Loading route...</span>
        </div>
      ):(
        <div style={{background:T.white,borderRadius:14,padding:14,boxShadow:T.shadowLg,minWidth:220}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <Avatar initials="JR" size={32}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:T.gray800}}>James Rivera</div>
              <div style={{fontSize:10,color:T.gray500}}>Hyundai Sonata · Sedan</div>
            </div>
            {tripSim==='done'&&<span style={{fontSize:8,fontWeight:700,color:'#fff',background:'#00C9A7',padding:'2px 6px',borderRadius:4}}>ARRIVED</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,fontSize:10,color:T.gray500}}>
            <Icon name="route" size={14} color="#00C9A7"/>
            <span>Champaign → O'Hare</span>
            {tripInfo&&<span style={{marginLeft:'auto',fontWeight:600}}>{tripInfo.distance} mi</span>}
          </div>
          {/* Progress bar */}
          <div style={{height:6,background:T.blue50,borderRadius:3,marginBottom:10,overflow:'hidden'}}>
            <div style={{height:'100%',background:'linear-gradient(90deg,#00C9A7,#00E6BE)',borderRadius:3,width:`${tripProgress}%`,transition:'width 0.1s linear'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:700,color:T.blue600}}>{tripProgress}%</span>
            {tripInfo&&<span style={{fontSize:10,color:T.gray500}}>~{tripInfo.duration} min real time</span>}
          </div>
          {/* Controls */}
          <div style={{display:'flex',gap:6}}>
            {tripSim==='running'?(
              <button onClick={pauseTripSim} style={{flex:1,padding:'8px 0',background:'#FFF3E0',color:'#E65100',border:'none',borderRadius:8,
                fontWeight:700,fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                <Icon name="pause" size={14} color="#E65100"/>Pause
              </button>
            ):tripSim==='paused'?(
              <button onClick={resumeTripSim} style={{flex:1,padding:'8px 0',background:'linear-gradient(135deg,#00C9A7,#00E6BE)',color:'#fff',border:'none',borderRadius:8,
                fontWeight:700,fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                <Icon name="play_arrow" size={14} color="#fff"/>Resume
              </button>
            ):null}
            <button onClick={resetTripSim} style={{flex:1,padding:'8px 0',background:T.blue50,color:T.gray500,border:'none',borderRadius:8,
              fontWeight:700,fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
              <Icon name="replay" size={14} color={T.gray600}/>{tripSim==='done'?'Replay':'Reset'}
            </button>
            {/* Speed control */}
            <button onClick={()=>{
              if(tripSpeedLevel.current===1)tripSpeedLevel.current=3;
              else if(tripSpeedLevel.current===3)tripSpeedLevel.current=10;
              else if(tripSpeedLevel.current===10)tripSpeedLevel.current=30;
              else tripSpeedLevel.current=1;
            }}

          </div>

    </div>
    {/* Selected driver info popup */}
    {selectedDriver&&(()=>{const sct=CAR_TYPES.find(c=>c.id===selectedDriver.carType);return(

/* VIP Chauffeur Live Map */
const VipChauffeurMap=({from,ch,G,confirmedAt})=>{
  const mapRef=useRef(null);
  const mapInstance=useRef(null);
  const markerRef=useRef(null);
  const pickupMarkerRef=useRef(null);
  const routeLineRef=useRef(null);
  const animRef=useRef(null);

  // Find pickup coords
  const pickupLoc=LOCS.find(l=>l.name===from);
  const pickupLat=pickupLoc?pickupLoc.lat:40.1164;
  const pickupLng=pickupLoc?pickupLoc.lng:-88.2434;

  // Chauffeur starts offset from pickup (stable across re-renders)
  const startRef=useRef(null);
  if(!startRef.current){const sLat=pickupLat+0.015+(Math.random()*0.005);const sLng=pickupLng-0.012+(Math.random()*0.005);startRef.current={lat:sLat,lng:sLng};}
  const posRef=useRef(startRef.current);

  useEffect(()=>{
    if(!mapRef.current||mapInstance.current)return;
    const L=window.L;if(!L)return;
    const m=L.map(mapRef.current,{zoomControl:false,attributionControl:false,dragging:true,scrollWheelZoom:false}).setView([pickupLat,pickupLng],14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(m);
    mapInstance.current=m;

    // Pickup marker
    const pickupIcon=L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,14],
      html:`<div style="width:28px;height:28px;border-radius:50%;background:#FFD700;border:3px solid rgba(255,215,0,0.3);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(255,215,0,0.4)"><span class="material-symbols-rounded" style="font-size:14px;color:#1a1a2e">location_on</span></div>`});
    pickupMarkerRef.current=L.marker([pickupLat,pickupLng],{icon:pickupIcon}).addTo(m);

    // Chauffeur marker
    const chIcon=L.divIcon({className:'',iconSize:[36,36],iconAnchor:[18,18],
      html:`<div style="width:36px;height:36px;border-radius:50%;background:#141420;border:2.5px solid #FFD700;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,215,0,0.3)"><span class="material-symbols-rounded" style="font-size:18px;color:#FFD700">directions_car</span></div>`});
    markerRef.current=L.marker([startRef.current.lat,startRef.current.lng],{icon:chIcon}).addTo(m);

    // Route line
    routeLineRef.current=L.polyline([[startRef.current.lat,startRef.current.lng],[pickupLat,pickupLng]],
      {color:'#FFD700',weight:3,opacity:0.4,dashArray:'8 6'}).addTo(m);

    // Fit bounds
    m.fitBounds([[startRef.current.lat,startRef.current.lng],[pickupLat,pickupLng]],{padding:[40,40]});

    // Animate chauffeur moving toward pickup
    let step=0;
    const totalSteps=300;
    const animate=()=>{
      step++;
      if(step>totalSteps){step=totalSteps;}
      const t=step/totalSteps;
      const eased=t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2); // ease in-out
      const lat=startRef.current.lat+(pickupLat-startRef.current.lat)*eased;
      const lng=startRef.current.lng+(pickupLng-startRef.current.lng)*eased;
      posRef.current={lat,lng};
      if(markerRef.current)markerRef.current.setLatLng([lat,lng]);
      if(routeLineRef.current)routeLineRef.current.setLatLngs([[lat,lng],[pickupLat,pickupLng]]);
      if(step<totalSteps){animRef.current=requestAnimationFrame(()=>setTimeout(()=>animate(),100));}
    };
    animRef.current=requestAnimationFrame(()=>setTimeout(()=>animate(),1000));

    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current);if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}};
  },[]);

  return(
    <div style={{margin:'12px 16px 0',borderRadius:14,overflow:'hidden',border:`1px solid ${G.goldBorder2}`,position:'relative'}}>
      <div ref={mapRef} style={{height:180,width:'100%',background:'#0a0a0f'}}/>
      {/* Overlay label */}
      <div style={{position:'absolute',top:10,left:10,zIndex:400,background:'rgba(20,20,32,0.9)',backdropFilter:'blur(8px)',
        borderRadius:10,padding:'6px 12px',border:`1px solid ${G.goldBorder}`,display:'flex',alignItems:'center',gap:6}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:'#FFD700',animation:'pulse 2s infinite'}}/>
        <span style={{fontSize:10,fontWeight:700,color:G.gold}}>LIVE</span>
        <span style={{fontSize:10,color:G.textSub}}>{ch.name}</span>
      </div>
      {/* ETA */}
      <div style={{position:'absolute',bottom:10,right:10,zIndex:400,background:'rgba(20,20,32,0.9)',backdropFilter:'blur(8px)',
        borderRadius:10,padding:'6px 12px',border:`1px solid ${G.goldBorder}`,display:'flex',alignItems:'center',gap:4}}>
        <Icon name="schedule" size={12} color={G.gold}/>
        <span style={{fontSize:10,fontWeight:700,color:G.text}}>ETA ~5 min</span>
      </div>
    </div>
  );
};

                    {tripRating===5?'Outstanding!':tripRating===4?'Great Experience!':tripRating===3?'Good Trip':tripRating===2?'Could Be Better':'Needs Improvement'}
                  </div>
                )}
                {/* Tip */}
                {tripRating>0&&(
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:600,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:10}}>Add a Tip</div>
                    <div style={{display:'flex',justifyContent:'center',gap:8}}>
                      {[0,10,20,30,50].map(t=>(
                        <button key={t} onClick={()=>setTripTip(t)}
                          style={{padding:'8px 16px',borderRadius:10,fontWeight:700,fontSize:12,cursor:'pointer',transition:'all .2s',
                            background:tripTip===t?'linear-gradient(135deg,#FFD700,#FFC107)':'rgba(255,255,255,0.04)',
                            color:tripTip===t?'#1a1a2e':G.textSub,
                            border:tripTip===t?'none':`1px solid ${G.border}`}}>
                          {t===0?'None':`$${t}`}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                {/* Submit */}
                {tripRating>0&&(
                  <button onClick={()=>setRatingSubmitted(true)}
                    style={{width:'100%',padding:'14px 0',background:'linear-gradient(135deg,#FFD700,#FFC107)',color:'#1a1a2e',
                      border:'none',borderRadius:12,fontWeight:800,fontSize:14,cursor:'pointer',boxShadow:'0 4px 20px rgba(255,215,0,0.25)',
                      display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                    <Icon name="send" size={16} color="#1a1a2e"/>Submit Rating{tripTip>0?` & $${tripTip} Tip`:''}
                  </button>
                )}
              </>
            ):(
              <div style={{padding:'10px 0'}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:'linear-gradient(135deg,rgba(0,201,167,0.15),rgba(0,201,167,0.05))',
                  border:'2.5px solid rgba(0,201,167,0.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',
                  boxShadow:'0 0 24px rgba(0,201,167,0.15)'}}>
                  <Icon name="favorite" size={30} color="#00C9A7"/>
                </div>
                <div style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:4}}>Thank You!</div>
                <div style={{fontSize:12,color:G.textSub,marginBottom:4}}>Your {tripRating}-star rating has been submitted</div>
                {tripTip>0&&<div style={{fontSize:12,color:G.gold,fontWeight:600}}>${tripTip} tip sent to {ch.name}</div>}
              </div>
            )}
          </div>

          {/* Trip Progress Steps */}
          <div style={{margin:'16px 16px 0',background:G.card,borderRadius:16,padding:'16px 16px',border:`1px solid ${G.border}`}}>
            <div style={{fontSize:10,fontWeight:700,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:14}}>Trip Timeline</div>
            {[
              {icon:'check_circle',label:'Chauffeur Confirmed',done:true},
              {icon:'directions_car',label:'Chauffeur En Route',done:true},
              {icon:'where_to_vote',label:'Arrived at Pickup',done:true},
              {icon:'moving',label:'Trip In Progress',done:true},
              {icon:'flag',label:'Arrived at Destination',done:true},
            ].map((s,i,arr)=>(
              <div key={i} style={{display:'flex',gap:12,position:'relative'}}>
                {i<arr.length-1&&<div style={{position:'absolute',left:13,top:28,width:2,height:28,background:s.done?'rgba(255,215,0,0.2)':'rgba(255,255,255,0.04)'}}/>}
                <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,
                  background:s.done?'rgba(255,215,0,0.1)':'rgba(255,255,255,0.03)',
                  border:s.done?'1.5px solid rgba(255,215,0,0.3)':'1.5px solid rgba(255,255,255,0.06)',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name={s.done?'check':s.icon} size={14} color={s.done?'#FFD700':'rgba(255,255,255,0.15)'}/>
                </div>
                <div style={{paddingBottom:i<arr.length-1?16:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:s.done?G.text:G.textDim}}>{s.label}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Bottom actions */}
          <div style={{padding:'20px 16px',display:'flex',gap:10}}>
            <button onClick={()=>{clearBooking()}}
              style={{flex:1,padding:'14px 0',background:'linear-gradient(135deg,#FFD700,#FFC107)',color:'#1a1a2e',border:'none',
                borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',boxShadow:'0 4px 16px rgba(255,215,0,0.2)',
                display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <Icon name="home" size={16} color="#1a1a2e"/>Done
            </button>
          </div>
        </div>
      );
    }

    /* Trip progress steps for active tracking */
    const tripSteps=[
      {icon:'check_circle',label:'Chauffeur Confirmed',status:'confirmed',done:['confirmed','driver_enroute','driver_arrived','trip_started','trip_completed'].includes(bookingStatus)},
      {icon:'directions_car',label:'En Route to Pickup',status:'driver_enroute',done:['driver_enroute','driver_arrived','trip_started','trip_completed'].includes(bookingStatus),active:bookingStatus==='driver_enroute'},
      {icon:'where_to_vote',label:'Arrived at Pickup',status:'driver_arrived',done:['driver_arrived','trip_started','trip_completed'].includes(bookingStatus),active:bookingStatus==='driver_arrived'},
      {icon:'moving',label:'Trip In Progress',status:'trip_started',done:['trip_started','trip_completed'].includes(bookingStatus),active:bookingStatus==='trip_started'},
      {icon:'flag',label:'Destination',status:'trip_completed',done:bookingStatus==='trip_completed'},
    ];

    return(
      <div style={{height:'100%',overflowY:'auto',background:G.bg,paddingBottom:100}}>
        {/* Header */}
        <div style={{background:G.hero,padding:'48px 20px 28px',borderRadius:`0 0 ${T.radiusXl}px ${T.radiusXl}px`,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,215,0,0.06),transparent)'}}/>
          <div style={{position:'relative',zIndex:2,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <img src="/demos/assets/vip-logo.png" alt="VIP" style={{width:40,height:40,borderRadius:10,filter:'drop-shadow(0 3px 12px rgba(255,215,0,0.4))',objectFit:'cover'}}/>
              <div>
                <div style={{fontSize:16,fontWeight:800,color:G.text}}>VIP Booking</div>
                <div style={{fontSize:11,color:G.textSub}}>Ref #{bookingRef.current}</div>
              </div>
            </div>
            <button onClick={onBack} style={{background:'rgba(255,215,0,0.1)',border:'1px solid rgba(255,215,0,0.2)',borderRadius:10,
              padding:'8px 14px',cursor:'pointer',color:G.gold,fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
              <Icon name="home" size={14} color={G.gold}/>Home
            </button>
          </div>
        </div>

        {/* Confirmed celebration banner */}
        {['confirmed','driver_enroute'].includes(bookingStatus)&&(
          <div style={{margin:'16px 16px 0',background:'linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,199,0,0.04))',
            borderRadius:18,padding:'28px 20px',border:'1px solid rgba(255,215,0,0.15)',textAlign:'center',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-30,left:-30,width:100,height:100,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,215,0,0.12),transparent)'}}/>
            <div style={{position:'absolute',bottom:-20,right:-20,width:80,height:80,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,199,0,0.08),transparent)'}}/>
            <div style={{position:'relative',zIndex:2}}>
              <div style={{width:72,height:72,borderRadius:'50%',background:'linear-gradient(135deg,rgba(0,201,167,0.15),rgba(0,201,167,0.05))',
                border:'2.5px solid rgba(0,201,167,0.35)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',
                boxShadow:'0 0 30px rgba(0,201,167,0.2), inset 0 0 20px rgba(0,201,167,0.05)'}}>
                <Icon name="check_circle" size={36} color="#00C9A7"/>
              </div>
              <div style={{fontSize:22,fontWeight:900,color:'#fff',marginBottom:4,letterSpacing:-0.5}}>Ride Confirmed!</div>
              <div style={{fontSize:13,color:'rgba(255,255,255,0.55)',marginBottom:16}}>Your VIP chauffeur has accepted the booking</div>
              <div style={{display:'flex',justifyContent:'center',gap:16,flexWrap:'wrap'}}>
                <div style={{background:'rgba(0,0,0,0.2)',borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',gap:6}}>
                  <Icon name="person" size={14} color={G.gold}/>
                  <span style={{fontSize:11,color:G.text,fontWeight:600}}>{ch.name}</span>
                </div>
                <div style={{background:'rgba(0,0,0,0.2)',borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',gap:6}}>
                  <Icon name="star" size={14} color={G.gold}/>
                  <span style={{fontSize:11,color:G.text,fontWeight:600}}>{ch.rating} rated</span>
                </div>
                <div style={{background:'rgba(0,0,0,0.2)',borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',gap:6}}>
                  <Icon name="schedule" size={14} color={G.gold}/>
                  <span style={{fontSize:11,color:G.text,fontWeight:600}}>{time}</span>
                </div>
              </div>
              {/* Cancellation policy */}
              <div style={{marginTop:16,padding:'12px 16px',background:'rgba(0,0,0,0.25)',borderRadius:12,border:'1px solid rgba(255,255,255,0.04)'}}>
                {canCancelFree?(
                  <div>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:4}}>
                      <Icon name="timer" size={14} color="#F59E0B"/>
                      <span style={{fontSize:12,fontWeight:700,color:'#F59E0B'}}>Free cancellation window: {cancelCountdown}</span>
                    </div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.4)'}}>Cancel within 5 minutes for a full refund</div>
                  </div>
                ):(
                  <div>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:4}}>
                      <Icon name="info" size={14} color="#FF6B6B"/>
                      <span style={{fontSize:12,fontWeight:700,color:'#FF6B6B'}}>Free cancellation window expired</span>
                    </div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.4)'}}>Cancellations after 5 minutes are non-refundable</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* Pending status */}
        {isPending&&(
          <div style={{margin:'16px 16px 0',background:G.card,borderRadius:14,padding:16,border:'1px solid rgba(245,158,11,0.2)',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,height:3,background:'#F59E0B',width:'40%',borderRadius:3,
              animation:'pulse 2s infinite'}}/>
            <div style={{display:'flex',alignItems:'center',gap:12,marginTop:4}}>
              <div style={{width:44,height:44,borderRadius:12,background:'rgba(245,158,11,0.1)',display:'flex',alignItems:'center',justifyContent:'center',
                animation:'pulse 2s infinite'}}>
                <Icon name="hourglass_top" size={22} color="#F59E0B"/>
              </div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:G.text}}>Awaiting Chauffeur</div>
                <div style={{fontSize:11,color:G.textSub}}>We're matching you with the perfect chauffeur...</div>
              </div>
            </div>
          </div>
        )}

        {/* Chauffeur Live Location Map */}
        {['confirmed','driver_enroute','driver_arrived'].includes(bookingStatus)&&<VipChauffeurMap from={from} ch={ch} G={G} confirmedAt={confirmedAt}/>}

        {/* Trip in progress banner */}
        {bookingStatus==='trip_started'&&(
          <div style={{margin:'16px 16px 0',background:'linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,199,0,0.03))',
            borderRadius:14,padding:16,border:`1px solid ${G.goldBorder2}`,display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:'rgba(255,215,0,0.1)',display:'flex',alignItems:'center',justifyContent:'center',
              animation:'pulse 2s infinite'}}>
              <Icon name="moving" size={22} color={G.gold}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:G.text}}>Trip In Progress</div>
              <div style={{fontSize:11,color:G.textSub}}>{from} → {to}</div>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:G.gold}}>Enjoy the ride!</div>
          </div>
        )}

        {/* Driver arrived banner */}
        {bookingStatus==='driver_arrived'&&(
          <div style={{margin:'12px 16px 0',background:'linear-gradient(135deg,rgba(255,215,0,0.1),rgba(255,215,0,0.03))',
            borderRadius:14,padding:14,border:`1px solid ${G.goldBorder2}`,display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:'rgba(255,215,0,0.12)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon name="where_to_vote" size={20} color={G.gold}/>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:G.text}}>Chauffeur has arrived!</div>
              <div style={{fontSize:11,color:G.textSub}}>Waiting at your pickup location</div>
            </div>
          </div>
        )}

        {/* Car + Trip Info */}
        <div style={{margin:'12px 16px 0',borderRadius:14,overflow:'hidden',height:100,position:'relative',boxShadow:'0 4px 16px rgba(0,0,0,0.3)'}}>
          <img src={selectedCar.img} alt={selectedCar.name} style={{width:'100%',height:'100%',objectFit:'cover',filter:'brightness(0.6)'}}/>
          <div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.2) 100%)'}}/>
          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:'#fff'}}>{selectedCar.name}</div>
              <div style={{fontSize:10,color:T.gray500}}>{from} → {to}</div>
              <div style={{fontSize:10,color:T.gray400}}>{date} at {time}</div>
            </div>
            <div style={{fontSize:20,fontWeight:900,color:G.gold,textShadow:'0 2px 8px rgba(0,0,0,0.5)'}}>${totalPrice}</div>
          </div>
        </div>

        {/* Chauffeur Card with Call & Chat */}
        {!isPending&&(
          <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:16,border:`1px solid ${G.goldBorder}`}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              <div style={{position:'relative'}}>
                <Avatar initials={ch.avatar} size={52} bg="rgba(255,215,0,0.15)"/>
                <div style={{position:'absolute',bottom:-2,right:-2,width:16,height:16,borderRadius:'50%',background:'#FFD700',
                  border:'2px solid #141420',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name="check" size={9} color="#1a1a2e"/>
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:G.text}}>{ch.name}</div>
                <div style={{fontSize:11,color:G.textSub}}>{ch.car} · {ch.rating} rating · {ch.trips.toLocaleString()} trips</div>
                <div style={{fontSize:10,color:G.textDim,marginTop:2}}>{ch.languages.join(', ')}</div>
              </div>
            </div>
            {/* Action buttons */}
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setShowChat(true)} style={{flex:1,padding:'11px 0',background:'rgba(255,215,0,0.08)',border:`1px solid ${G.goldBorder2}`,
                borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,color:G.gold,fontSize:12,fontWeight:600}}>
                <Icon name="chat" size={16} color={G.gold}/>Message
              </button>
              <button onClick={()=>setShowCall(true)} style={{flex:1,padding:'11px 0',background:'rgba(255,215,0,0.08)',border:`1px solid ${G.goldBorder2}`,
                borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,color:G.gold,fontSize:12,fontWeight:600}}>
                <Icon name="call" size={16} color={G.gold}/>Call
              </button>
            </div>
          </div>
        )}

        {/* Trip Progress Steps */}
        {!isPending&&(
          <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:16,border:`1px solid ${G.goldBorder}`}}>
            <div style={{fontSize:10,fontWeight:700,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:12}}>Trip Progress</div>
            {tripSteps.map((s,i,arr)=>(
              <div key={i} style={{display:'flex',gap:10,position:'relative'}}>
                {i<arr.length-1&&<div style={{position:'absolute',left:12,top:26,width:2,height:24,
                  background:s.done?'rgba(255,215,0,0.2)':'rgba(255,255,255,0.04)'}}/>}
                <div style={{width:26,height:26,borderRadius:'50%',flexShrink:0,
                  background:s.done?'rgba(255,215,0,0.1)':s.active?'rgba(255,215,0,0.06)':'rgba(255,255,255,0.02)',
                  border:s.done?'1.5px solid rgba(255,215,0,0.3)':s.active?'1.5px solid rgba(255,215,0,0.15)':'1.5px solid rgba(255,255,255,0.06)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  animation:s.active?'pulse 2s infinite':'none'}}>
                  <Icon name={s.done?'check':s.icon} size={13} color={s.done?'#FFD700':s.active?'rgba(255,215,0,0.6)':'rgba(255,255,255,0.12)'}/>
                </div>
                <div style={{paddingBottom:i<arr.length-1?12:0,display:'flex',alignItems:'center'}}>
                  <span style={{fontSize:11,fontWeight:s.done||s.active?600:400,color:s.done?G.text:s.active?G.gold:G.textDim}}>{s.label}</span>
                  {s.active&&<span style={{marginLeft:8,fontSize:9,fontWeight:700,color:G.gold,background:'rgba(255,215,0,0.08)',padding:'2px 8px',borderRadius:6}}>NOW</span>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Activity Feed */}
        <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:16,border:`1px solid ${G.border}`}}>
          <div style={{fontSize:12,fontWeight:700,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:12}}>Activity</div>
          {driverMessages.length===0?(
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{width:40,height:40,borderRadius:'50%',background:'rgba(255,215,0,0.1)',
                display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',animation:'pulse 2s infinite'}}>
                <Icon name="hourglass_top" size={20} color={G.gold}/>
              </div>
              <div style={{fontSize:12,color:G.textSub}}>Sending your request...</div>
            </div>
          ):driverMessages.map((msg,i)=>(
            <div key={i} style={{display:'flex',gap:10,marginBottom:i<driverMessages.length-1?12:0,
              paddingBottom:i<driverMessages.length-1?12:0,borderBottom:i<driverMessages.length-1?`1px solid ${G.border}`:'none'}}>
              <div style={{width:32,height:32,borderRadius:8,flexShrink:0,
                background:msg.from==='system'?'rgba(255,255,255,0.04)':'rgba(255,215,0,0.1)',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={msg.from==='system'?'notifications':'person'} size={16}
                  color={msg.from==='system'?G.textDim:G.gold}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:msg.from==='system'?G.textSub:G.text,lineHeight:1.5}}>{msg.text}</div>
                <div style={{fontSize:9,color:G.textDim,marginTop:4}}>{msg.time}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Add-ons Summary */}
        {addonsTotal>0&&(
          <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:14,border:`1px solid ${G.border}`}}>
            <div style={{fontSize:10,fontWeight:600,color:G.textDim,textTransform:'uppercase',letterSpacing:0.5,marginBottom:8}}>Add-on Services</div>
            {Object.keys(addons).filter(k=>addons[k]).map(k=>{
              const names={meetgreet:'Meet & Greet',childseat:'Child Car Seat',luggage:'Extra Luggage',stopover:'Additional Stop',flowers:'Flowers & Champagne',redcarpet:'Red Carpet Arrival'};
              return(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}>
                  <span style={{fontSize:11,color:G.textSub}}>{names[k]}</span>
                  <span style={{fontSize:11,fontWeight:600,color:G.gold}}>+${ADDON_PRICES[k]}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* Cancel with confirmation */}
        {['confirmed','driver_enroute'].includes(bookingStatus)&&(
          <div style={{margin:'12px 16px 0',background:G.card,borderRadius:14,padding:14,border:`1px solid ${canCancelFree?'rgba(245,158,11,0.15)':'rgba(255,107,107,0.15)'}`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:canCancelFree?8:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Icon name={canCancelFree?'timer':'warning'} size={16} color={canCancelFree?'#F59E0B':'#FF6B6B'}/>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:G.text}}>{canCancelFree?'Free Cancellation Available':'Cancellation Policy'}</div>
                  <div style={{fontSize:10,color:G.textSub}}>{canCancelFree?`${cancelCountdown} remaining for full refund`:'No refund after 5-minute window'}</div>
                </div>
              </div>
              <button onClick={()=>{
                if(!canCancelFree){
                  if(!confirm('The free cancellation window has expired. You will NOT receive a refund. Cancel anyway?'))return;
                }
                clearBooking();
              }}
                style={{padding:'8px 16px',background:canCancelFree?'rgba(245,158,11,0.1)':'rgba(255,107,107,0.1)',
                  border:`1px solid ${canCancelFree?'rgba(245,158,11,0.25)':'rgba(255,107,107,0.25)'}`,borderRadius:10,
                  color:canCancelFree?'#F59E0B':'#FF6B6B',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                Cancel
              </button>
            </div>
          </div>
        )}

        {/* Bottom Actions */}
        <div style={{padding:'16px 16px',display:'flex',gap:10}}>
          {isPending?(
            <>
              <button onClick={clearBooking}
